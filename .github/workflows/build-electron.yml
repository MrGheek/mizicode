name: Build Mac App

# Produces a macOS .dmg for the Mizi-Local Electron distribution.
# electron-builder requires macOS tooling (hdiutil, appdmg) to create .dmg
# files, so this job must run on macos-latest — it cannot run on ubuntu-latest.
#
# Triggers:
#   • Push of any v* tag  → builds + attaches DMG to the GitHub Release
#   • workflow_dispatch   → builds + uploads as an Actions artifact (for testing)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write   # needed to attach assets to a GitHub Release

jobs:
  build-mac:
    name: Build Mac DMG
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        # ELECTRON_SKIP_BINARY_DOWNLOAD=1 avoids downloading the full Electron
        # binary during pnpm install; electron-builder downloads it separately
        # when it actually needs it for packaging.
        run: ELECTRON_SKIP_BINARY_DOWNLOAD=1 pnpm install --frozen-lockfile

      - name: Import Apple Developer ID certificate
        # Only run when the signing secrets are present (i.e. on the main repo,
        # not on forks or workflow_dispatch runs without secrets).
        if: ${{ secrets.APPLE_CERTIFICATE != '' }}
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Decode the base64-encoded .p12 into a temp file
          echo "$APPLE_CERTIFICATE" | base64 --decode > /tmp/certificate.p12

          # Create a dedicated keychain so we never touch the login keychain
          security create-keychain -p "ci-keychain-password" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "ci-keychain-password" build.keychain

          # Import the certificate — allow electron-builder (codesign) to use it
          security import /tmp/certificate.p12 \
            -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign

          # Allow codesign to access the key without an interactive prompt
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "ci-keychain-password" \
            build.keychain

          # Extend keychain lock timeout so it stays open during the build
          security set-keychain-settings -t 3600 -l build.keychain

          # Clean up the temp file
          rm /tmp/certificate.p12

      - name: Build Mac DMG
        run: pnpm build:electron
        env:
          CI: "true"
          MIZI_DISTRIBUTION: local
          # GH_TOKEN lets electron-builder read release metadata if needed;
          # actual asset upload is handled by the step below.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Code-signing & notarization — only populated on the main repo.
          # electron-builder reads these automatically.
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload DMG as Actions artifact
        uses: actions/upload-artifact@v4
        with:
          name: mizi-mac-dmg
          # Capture both arm64 and x64 DMGs
          path: dist-electron/*.dmg
          if-no-files-found: error
          retention-days: 14

      - name: Attach DMG to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist-electron/*.dmg
          # Fail if the release doesn't already exist (must be created first
          # via the GitHub UI or a separate release workflow).
          fail_on_unmatched_files: true
