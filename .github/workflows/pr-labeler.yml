name: PR Labeler

  on:
    pull_request:
      types: [opened, reopened, synchronize, ready_for_review]

  # Cancel in-progress labelling runs when a new commit arrives on the same PR.
  concurrency:
    group: pr-labeler-${{ github.ref }}
    cancel-in-progress: true

  permissions:
    contents: read
    pull-requests: write

  jobs:
    label:
      name: Apply component labels
      runs-on: ubuntu-latest
      permissions:
        contents: read
        pull-requests: write

      steps:
        - name: Apply labels based on changed paths
          uses: actions/labeler@9b84357e8f16f5194f4f10fb2c3fd671d7a9fd3a # v5.0.0
          with:
            repo-token: ${{ secrets.GITHUB_TOKEN }}
            configuration-path: .github/labeler.yml
  