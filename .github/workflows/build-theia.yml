name: Build MIZI Theia

on:
  push:
    branches: [main]
    paths:
      - "docker/mizi-theia/**"
      - ".github/workflows/build-theia.yml"
  pull_request:
    paths:
      - "docker/mizi-theia/**"
      - ".github/workflows/build-theia.yml"
  workflow_dispatch:

concurrency:
  group: mizi-theia-${{ github.event_name == 'pull_request' && github.ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      attestations: write
      id-token: write

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install
        working-directory: docker/mizi-theia

      - name: Compile MIZI extensions
        working-directory: docker/mizi-theia/packages/mizi-extensions
        run: npx tsc

      - name: Build Theia
        run: npx theia build
        working-directory: docker/mizi-theia

      - name: Package build artifact
        run: |
          tar czf /tmp/mizi-theia.tar.gz \
            --exclude=node_modules/.cache \
            -C docker/mizi-theia \
            src-gen/ lib/ node_modules/ package.json packages/mizi-extensions/lib packages/mizi-extensions/package.json

      - name: Upload artifact
        uses: actions/upload-artifact@v4.6.0
        with:
          name: mizi-theia-${{ github.sha }}
          path: /tmp/mizi-theia.tar.gz
          retention-days: 90

  publish:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      attestations: write
      id-token: write

    steps:
      - uses: actions/download-artifact@v4.1.8
        with:
          name: mizi-theia-${{ github.sha }}
          path: /tmp

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2.2.1
        with:
          tag_name: theia
          name: MIZI Theia Artifact
          body: "Auto-built Theia IDE artifact from commit ${{ github.sha }}"
          files: /tmp/mizi-theia.tar.gz
          fail_on_unmatched_files: false
          make_latest: true
          prerelease: false
