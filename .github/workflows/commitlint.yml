name: Commitlint — PR Title

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]
  # merge_group: adding this trigger registers the check name in the merge
  # queue's required-check list. The PR title is validated during the
  # pull_request event above; by the time a PR enters the merge queue the
  # title has already passed validation. The merge_group run simply exits
  # successfully so the required check is satisfied.
  merge_group:

permissions:
  contents: read
  pull-requests: read

jobs:
  commitlint:
    name: Validate PR title (conventional commits)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # Validates the PR title on pull_request events only.
      # Skipped in merge_group runs — the title was already validated when
      # the PR was opened/edited. The job still reports success so the
      # merge queue required check is satisfied.
      - name: Lint PR title
        if: github.event_name == 'pull_request'
        uses: amannn/action-semantic-pull-request@0723387faaf9b38adef4775cd42cfd5d98f8d12 # v5.5.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Accepted types (aligned with release.yml bump logic).
          types: |
            feat
            fix
            hotfix
            docs
            refactor
            perf
            ci
            chore
            build
            test
            revert
          # Allow breaking change marker in body/footer.
          requireScope: false
          # Squash-merge strategy: PR title becomes the commit message.
          # Enforce that it parses as a valid conventional commit so the
          # release workflow can determine the correct version bump.

      - name: Skip — merge queue (title already validated)
        if: github.event_name == 'merge_group'
        run: echo "merge_group event — PR title was validated on pull_request. Nothing to do."
