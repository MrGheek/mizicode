name: Commitlint — PR Title

  on:
    pull_request:
      types: [opened, edited, reopened, synchronize]
    merge_group:

  # Cancel stale runs when a new commit or edit arrives on the same PR.
  # merge_group runs are not cancelled (unique run_id key) so they always complete.
  concurrency:
    group: commitlint-${{ github.event_name == 'pull_request' && github.ref || github.run_id }}
    cancel-in-progress: ${{ github.event_name == 'pull_request' }}

  permissions:
    contents: read
    pull-requests: read

  jobs:
    commitlint:
      name: Validate PR title (conventional commits)
      runs-on: ubuntu-latest
      permissions:
        contents: read
        pull-requests: read

      steps:
        - name: Checkout
          uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

        - name: Lint PR title
          if: github.event_name == 'pull_request'
          uses: amannn/action-semantic-pull-request@0723387faaf9b38adef4775cd42cfd5d98f8d12 # v5.5.3
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          with:
            types: |
              feat
              fix
              hotfix
              docs
              refactor
              perf
              ci
              chore
              build
              test
              revert
            requireScope: false

        - name: Skip — merge queue (title already validated)
          if: github.event_name == 'merge_group'
          run: echo "merge_group event — PR title was validated on pull_request. Nothing to do."
  