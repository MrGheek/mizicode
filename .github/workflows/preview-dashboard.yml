name: Preview — Dashboard

# Deploys a preview of the dashboard on every PR that touches frontend-affecting
# files. Posts a sticky comment with the preview URL; subsequent commits update
# the same comment rather than creating duplicates.
#
# Can also be triggered manually via workflow_dispatch to verify that the three
# Vercel secrets in the `preview` Environment are correctly configured — no PR
# required. The manual path skips PR commenting and instead writes the preview
# URL to the workflow summary.
#
# Default provider: Vercel. To switch providers, replace the "Deploy to preview"
# step with your provider's CLI command and update the Environment secrets.
#
# Required one-time setup (see docs/github-ops.md → Layer 2):
# 1. Create a `preview` GitHub Environment in Settings → Environments.
# 2. Add Environment secrets:
#    - PREVIEW_VERCEL_TOKEN  — Vercel API token (Settings → Tokens in vercel.com)
#    - PREVIEW_VERCEL_ORG_ID — Vercel team/org ID (from vercel.com/account)
#    - PREVIEW_VERCEL_PROJECT_ID — Vercel project ID (from project Settings)

on:
  pull_request:
    paths:
      - "artifacts/dashboard/**"
      - "pnpm-workspace.yaml"
      - "package.json"
      - "tsconfig*.json"
  workflow_dispatch:

# Cancel in-progress preview runs for the same PR when a new commit is pushed.
# For manual dispatch runs the group key is the run ID so they never cancel each other.
concurrency:
  group: preview-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  preview:
    name: Deploy dashboard preview
    runs-on: ubuntu-latest
    environment: preview
    permissions:
      contents: read
      deployments: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build dashboard
        run: pnpm --filter @workspace/dashboard run build

      - name: Install Vercel CLI
        run: npm install -g vercel@41

      # ── GitHub Deployment (created before deploy so the PR sidebar shows it) ─
      - name: Create GitHub deployment
        id: create-deployment
        uses: chrnorm/deployment-action@500aa6a23c81ffa1acf71072aee3cfa2cc2e556a # v2.0.8
        with:
          token: ${{ github.token }}
          environment: preview
          ref: ${{ github.event.pull_request.head.sha }}
          auto-merge: false
          transient-environment: true
          production-environment: false

      # ── Deploy to Vercel preview ───────────────────────────────────────────
      # Deploys the already-built dashboard dist directory to Vercel as a static
      # site and captures the resulting preview URL.
      #
      # `vercel deploy <dir>` treats a directory containing only static assets
      # (no package.json / vercel.json) as a static deployment — Vercel skips
      # any framework build and serves the files directly. This is intentional:
      # we built the dashboard ourselves with `pnpm build` in the step above, so
      # we just hand the dist output to Vercel for hosting.
      #
      # VERCEL_ORG_ID and VERCEL_PROJECT_ID are read from the environment
      # automatically by the Vercel CLI — no project.json file is required.
      #
      # To switch providers: replace this step with your provider's CLI command.
      # The step must write: echo "url=<preview-url>" >> "$GITHUB_OUTPUT"
      - name: Deploy to preview (Vercel)
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.PREVIEW_VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.PREVIEW_VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.PREVIEW_VERCEL_PROJECT_ID }}
        run: |
          # Redirect stderr to /dev/null to suppress spinner/progress output.
          # grep extracts the first HTTPS URL from stdout — Vercel always emits
          # the deployment URL on its own line at the end of output.
          PREVIEW_URL=$(vercel deploy artifacts/dashboard/dist \
            --token "$VERCEL_TOKEN" \
            --yes \
            2>/dev/null | grep -Eo 'https://[^[:space:]]+' | head -1)
          if [ -z "$PREVIEW_URL" ]; then
            echo "::error::Vercel deploy did not return a preview URL. Check PREVIEW_VERCEL_TOKEN, PREVIEW_VERCEL_ORG_ID, and PREVIEW_VERCEL_PROJECT_ID secrets in the 'preview' Environment."
            exit 1
          fi
          echo "url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"

      # ── Manual dispatch: write URL to job summary ──────────────────────────
      # Runs only when the workflow is triggered via workflow_dispatch (i.e. no
      # PR number is available). This is the recommended way to verify that the
      # three Vercel secrets are correctly configured after initial setup.
      - name: Write preview URL to job summary
        if: github.event_name == 'workflow_dispatch'
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ### Dashboard Preview (manual dispatch)

          | | |
          |---|---|
          | **URL** | ${{ steps.deploy.outputs.url }} |
          | **Branch** | \`${{ github.ref_name }}\` |
          | **Commit** | \`${{ github.sha }}\` |

          > Triggered manually via workflow_dispatch. Secrets in the \`preview\` Environment are working correctly.
          EOF

      # ── Sticky PR comment ──────────────────────────────────────────────────
      # On first run: post a new comment tagged with a hidden marker.
      # On subsequent commits: find and edit the existing comment in place.
      # Skipped when the workflow is triggered manually (no PR to comment on).
      - name: Find existing preview comment
        id: find-comment
        if: github.event_name == 'pull_request'
        uses: peter-evans/find-comment@b30e6a3c0ed37e7c023ccd3f1db5c6c0b0c23aad # v4.0.0
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: "github-actions[bot]"
          body-includes: "<!-- preview-dashboard-comment -->"

      - name: Post or update preview comment
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          edit-mode: replace
          body: |
            <!-- preview-dashboard-comment -->
            ### Dashboard Preview

            | | |
            |---|---|
            | **URL** | ${{ steps.deploy.outputs.url }} |
            | **Commit** | `${{ github.event.pull_request.head.sha }}` |

            > This comment is updated automatically on each new commit to this PR.

      # ── GitHub Deployment status ───────────────────────────────────────────
      # These steps run last so the final deployment state reflects the outcome
      # of the entire job (including the comment steps above), not just the
      # Vercel deploy step.
      - name: Update deployment status (success)
        if: success()
        uses: chrnorm/deployment-status@6df8d036fd2fee9eb82936733953da1f8382b41e # v2.0.4
        with:
          token: ${{ github.token }}
          deployment-id: ${{ steps.create-deployment.outputs.deployment_id }}
          state: success
          environment-url: ${{ steps.deploy.outputs.url }}
          description: "Preview deployed successfully"

      - name: Update deployment status (failure)
        if: failure() && steps.create-deployment.outputs.deployment_id != ''
        uses: chrnorm/deployment-status@6df8d036fd2fee9eb82936733953da1f8382b41e # v2.0.4
        with:
          token: ${{ github.token }}
          deployment-id: ${{ steps.create-deployment.outputs.deployment_id }}
          state: failure
          description: "Preview deployment failed"
