name: Deploy to Fly.io

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - ".github/**"
      - "CHANGELOG.md"

# New pushes queue rather than cancel so no deploy is ever skipped.
concurrency:
  group: fly-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # Deploy API first — the dashboard SPA bakes in the API URL at build time.
  deploy-api-server:
    name: Deploy API Server (mizi-api)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # 1.6

      - name: Ensure app exists
        run: flyctl apps create mizi-api --org personal 2>/dev/null || true
        env:
          FLY_API_TOKEN: ${{ secrets.MIZIAPI }}

      - name: Deploy
        run: |
          flyctl deploy . \
            --config artifacts/api-server/fly.toml \
            --dockerfile artifacts/api-server/Dockerfile \
            --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.MIZIAPI }}

  deploy-dashboard:
    name: Deploy Dashboard (mizicode)
    runs-on: ubuntu-latest
    needs: deploy-api-server

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Wait for API server health
        run: |
          echo "Waiting for mizi-api to pass health check..."
          curl --retry 24 --retry-connrefused --retry-delay 5 \
            --max-time 10 \
            https://mizi-api.fly.dev/api/healthz
          echo "API health check passed"

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # 1.6

      - name: Ensure app exists
        run: flyctl apps create mizicode --org personal 2>/dev/null || true
        env:
          FLY_API_TOKEN: ${{ secrets.MIZIAPI }}

      - name: Deploy
        run: |
          flyctl deploy . \
            --config artifacts/dashboard/fly.toml \
            --build-arg VITE_API_BASE_URL=https://mizi-api.fly.dev \
            --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.MIZIAPI }}
