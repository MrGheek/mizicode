name: Deploy to Fly.io

on:
  push:
    branches: [main]

# New pushes queue rather than cancel so no deploy is ever skipped.
concurrency:
  group: fly-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # Deploy API first — the dashboard SPA bakes in the API URL at build time.
  deploy-api-server:
    name: Deploy API Server (mizi-api)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # 1.6

      - name: Ensure app exists
        run: flyctl apps create mizi-api --org personal 2>/dev/null || true
        env:
          FLY_API_TOKEN: ${{ secrets.MIZIAPI }}

      - name: Deploy
        run: |
          flyctl deploy . \
            --config artifacts/api-server/fly.toml \
            --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.MIZIAPI }}

  deploy-dashboard:
    name: Deploy Dashboard (mizicode)
    runs-on: ubuntu-latest
    needs: deploy-api-server

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # 1.6

      - name: Ensure app exists
        run: flyctl apps create mizicode --org personal 2>/dev/null || true
        env:
          FLY_API_TOKEN: ${{ secrets.MIZIAPI }}

      - name: Deploy
        # VITE_API_BASE_URL is defined in artifacts/dashboard/fly.toml [build.args]
        # and does not need to be repeated here.
        run: |
          flyctl deploy . \
            --config artifacts/dashboard/fly.toml \
            --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.MIZIAPI }}
