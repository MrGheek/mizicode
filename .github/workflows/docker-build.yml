name: Build & Push Docker Image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to build"
        required: true
        default: "all"
        type: choice
        options: [all, cuda12.4, a100, h100]
  push:
    branches: [main]
    paths:
      - "docker/**"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # 80=A100  86=RTX3090/3080  89=RTX4090/4080  90=H100
          # Numeric arches only — "all-major" / "-real" require cmake >= 3.23
          # but nvidia/cuda:12.4.0-devel-ubuntu22.04 ships cmake 3.22.
          - tag: cuda12.4
            cuda_version: "12.4.0"
            cuda_arch: "80;86;89;90"
          - tag: a100
            cuda_version: "12.4.0"
            cuda_arch: "80"
          - tag: h100
            cuda_version: "12.4.0"
            cuda_arch: "90"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.tag }}
        uses: docker/build-push-action@v6
        with:
          context: docker/
          file: docker/Dockerfile
          push: true
          tags: gheeklabs/coding-env:${{ matrix.tag }}
          build-args: |
            CUDA_VERSION=${{ matrix.cuda_version }}
            LLAMA_CUDA_ARCH=${{ matrix.cuda_arch }}
          cache-from: type=gha,scope=${{ matrix.tag }}
          cache-to: type=gha,scope=${{ matrix.tag }},mode=max
