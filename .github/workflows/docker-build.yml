name: Build & Push Docker Image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "docker/**"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push all tags
        uses: docker/build-push-action@v6
        with:
          context: docker/
          file: docker/Dockerfile
          push: true
          # All three tags are identical — same binary compiled for all modern GPU arches.
          # Building once and pushing multiple tags avoids parallel OOM kills.
          tags: |
            gheeklabs/coding-env:cuda12.4
            gheeklabs/coding-env:a100
            gheeklabs/coding-env:h100
            gheeklabs/coding-env:latest
          build-args: |
            CUDA_VERSION=12.4.0
            LLAMA_CUDA_ARCH=80;86;89;90
          cache-from: type=gha
          cache-to: type=gha,mode=max
