name: Workflow Hygiene

on:
  pull_request:
    paths:
      - ".github/workflows/**"

# Cancel in-progress lint runs when a new commit touches workflows on the same PR.
concurrency:
  group: workflow-hygiene-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  actionlint:
    name: Lint workflow files with actionlint
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Run actionlint
        uses: rhysd/actionlint@6849a0dbc5a87e04df4efec60e2a0f43a2e8ce4b # v1.7.4
        with:
          flags: "-color"
