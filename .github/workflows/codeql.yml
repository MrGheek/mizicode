name: CodeQL — Security Scanning

# Scans JavaScript/TypeScript source for security vulnerabilities.
#
# SOAK PERIOD NOTICE: This workflow is intentionally NOT configured as a
# required status check. The team should observe CodeQL results for 1–2
# weeks to verify alert quality and run time before deciding whether to
# gate PRs on it. See docs/github-ops.md for the recommended enrollment
# process.

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Weekly scan every Monday at 07:00 UTC (offset from Dependabot to
    # avoid simultaneous runner contention).
    - cron: "0 7 * * 1"

# Cancel in-progress scans for the same PR when a new commit arrives.
# Push-to-main and scheduled scans are never cancelled.
concurrency:
  group: codeql-${{ github.event_name == 'pull_request' && github.ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  analyze:
    name: CodeQL analysis (javascript-typescript)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: javascript-typescript
          # Scope analysis to application source; skip generated output,
          # vendored dependencies, and build artifacts.
          paths: |
            artifacts
            docker/scripts
          paths-ignore: |
            **/node_modules
            **/dist
            **/.next
            **/codegen

      - name: Autobuild
        uses: github/codeql-action/autobuild@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:javascript-typescript"
        # The SARIF upload requires "Code scanning" to be enabled in the
        # repository's Security settings (Settings → Code security → Code scanning).
        # For private repos it also requires GitHub Advanced Security.
        # continue-on-error prevents a missing repo setting from failing CI.
        continue-on-error: true
