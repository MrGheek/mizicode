        - architectureSketch
        - majorModules
        - hotspots

    RepoSummaryResponse:
      type: object
      properties:
        sessionId:
          type: integer
        indexStatus:
          type: string
        isStale:
          type: boolean
        confidenceLevel:
          type: string
