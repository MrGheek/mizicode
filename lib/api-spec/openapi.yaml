          type: object
          description: "Per-run scoring weights override. When set, replaces the task-mode preset weights for all variants in this run."
          additionalProperties:
            type: number
          nullable: true
        priority:
          type: integer
        costCapUsd:
          type: number
          nullable: true
        actualCostUsd:
          type: number
          nullable: true
