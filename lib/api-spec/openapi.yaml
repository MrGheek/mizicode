openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Cloud Coding Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: profiles
    description: GPU profile operations
  - name: sessions
    description: Coding session operations
  - name: templates
    description: Vast.ai template operations
  - name: offers
    description: GPU offer operations
  - name: scheduler
    description: Session scheduler configuration
  - name: skills
    description: Smart Skills library and bundle management
  - name: repo
    description: Repository intelligence — indexing, search, fingerprint, and blast radius

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /profiles:
    get:
      operationId: listProfiles
      tags: [profiles]
      summary: List GPU profiles
      description: Returns all available GPU profiles with performance and cost estimates
      responses:
        "200":
          description: List of GPU profiles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GpuProfile"

  /profiles/{profileId}:
    get:
      operationId: getProfile
      tags: [profiles]
      summary: Get a GPU profile
      parameters:
        - name: profileId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: GPU profile details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GpuProfile"
        "404":
          description: Profile not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions:
    get:
      operationId: listSessions
      tags: [sessions]
      summary: List all sessions
      description: Returns all coding sessions with status and service URLs
      responses:
        "200":
          description: List of sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Session"
    post:
      operationId: createSession
      tags: [sessions]
      summary: Start a new coding session
      description: Provisions a Vast.ai instance with the selected GPU profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSessionRequest"
      responses:
        "201":
          description: Session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/{sessionId}:
    get:
      operationId: getSession
      tags: [sessions]
      summary: Get session details
      description: Returns session status, service URLs, and cost tracking
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Session details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteSession
      tags: [sessions]
      summary: Stop and destroy a session
      description: Destroys the Vast.ai instance and updates session status
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Session destroyed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/active:
    get:
      operationId: getActiveSession
      tags: [sessions]
      summary: Get current active session
      description: Returns the currently running session if any
      responses:
        "200":
          description: Active session or null
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActiveSessionResponse"

  /sessions/{sessionId}/refresh:
    post:
      operationId: refreshSessionStatus
      tags: [sessions]
      summary: Refresh session status from Vast.ai
      description: Polls Vast.ai for the latest instance status and updates the session
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /templates:
    get:
      operationId: listTemplates
      tags: [templates]
      summary: List Vast.ai templates
      description: Returns all registered templates including the default
      responses:
        "200":
          description: List of templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Template"
    post:
      operationId: createTemplate
      tags: [templates]
      summary: Create a new template on Vast.ai
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTemplateRequest"
      responses:
        "201":
          description: Template created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Template"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /templates/{templateId}:
    get:
      operationId: getTemplate
      tags: [templates]
      summary: Get template details
      parameters:
        - name: templateId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Template details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Template"
        "404":
          description: Template not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateTemplate
      tags: [templates]
      summary: Update a template
      parameters:
        - name: templateId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTemplateRequest"
      responses:
        "200":
          description: Template updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Template"
        "404":
          description: Template not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteTemplate
      tags: [templates]
      summary: Delete a template
      parameters:
        - name: templateId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Template deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Template not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /offers:
    get:
      operationId: searchOffers
      tags: [offers]
      summary: Search GPU offers on Vast.ai
      description: Search available GPU machines with profile-aware filters
      parameters:
        - name: profileId
          in: query
          required: false
          schema:
            type: integer
          description: Filter offers by GPU profile
        - name: gpuName
          in: query
          required: false
          schema:
            type: string
          description: Filter by GPU name (e.g., RTX 4090)
        - name: numGpus
          in: query
          required: false
          schema:
            type: integer
          description: Minimum number of GPUs
        - name: maxPrice
          in: query
          required: false
          schema:
            type: number
          description: Maximum price per hour
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
          description: Max number of results
      responses:
        "200":
          description: List of GPU offers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GpuOffer"

  /scheduler:
    get:
      operationId: getSchedulerConfig
      tags: [scheduler]
      summary: Get scheduler configuration
      description: Returns the current session scheduler configuration
      responses:
        "200":
          description: Scheduler configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SchedulerConfig"
    put:
      operationId: updateSchedulerConfig
      tags: [scheduler]
      summary: Update scheduler configuration
      description: Updates the session scheduler configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSchedulerRequest"
      responses:
        "200":
          description: Updated scheduler configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SchedulerConfig"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [sessions]
      summary: Dashboard summary
      description: Returns summary stats for the dashboard
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /skills:
    get:
      operationId: listSkills
      tags: [skills]
      summary: List all skills
      description: Returns imported skills and built-in skill metadata
      parameters:
        - name: class
          in: query
          schema:
            type: string
            enum: [doctrine, workflow, context, efficiency, team, repo]
        - name: trustTier
          in: query
          schema:
            type: string
            enum: [floatr_native, reviewed, user_approved, experimental]
        - name: reviewStatus
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 200
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Skills list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillsListResponse"

  /skills/import:
    post:
      operationId: importSkill
      tags: [skills]
      summary: Import skills from a GitHub repository
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportSkillRequest"
      responses:
        "201":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportSkillResponse"
        "400":
          description: Invalid URL or no skills found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /skills/compile-preview:
    post:
      operationId: compileSkillPreview
      tags: [skills]
      summary: Preview bundle compilation (internal helper, non-contractual)
      description: "Internal helper: compile a bundle against a context and return the raw base64 payload + byte size. Not part of the public API contract; use /skill-bundles/compile for the standard compile endpoint."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompilePreviewRequest"
      responses:
        "200":
          description: Compiled bundle preview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompilePreviewResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /skills/evals:
    get:
      operationId: listSkillEvals
      tags: [skills]
      summary: List skill evaluation results (not yet available)
      responses:
        "501":
          description: Not implemented
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotImplementedResponse"

  /skills/evals/run:
    post:
      operationId: runSkillEval
      tags: [skills]
      summary: Run a skill evaluation harness (not yet available)
      responses:
        "501":
          description: Not implemented
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotImplementedResponse"

  /skills/discover:
    post:
      operationId: discoverSkills
      tags: [skills]
      summary: Discover skills from external registries (not yet available)
      responses:
        "501":
          description: Not implemented
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotImplementedResponse"

  /skills/leaderboard:
    get:
      operationId: getSkillLeaderboard
      tags: [skills]
      summary: Skill leaderboard (not yet available)
      responses:
        "501":
          description: Not implemented
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotImplementedResponse"

  /skills/{skillId}:
    get:
      operationId: getSkill
      tags: [skills]
      summary: Get skill details and version history
      parameters:
        - name: skillId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Skill with versions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillDetailResponse"
        "404":
          description: Skill not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /skills/{skillId}/review:
    post:
      operationId: reviewSkill
      tags: [skills]
      summary: Approve or reject a skill
      parameters:
        - name: skillId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewSkillRequest"
      responses:
        "200":
          description: Updated skill
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillDetailResponse"
        "404":
          description: Skill not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /skills/{skillId}/enable:
    post:
      operationId: enableSkill
      tags: [skills]
      summary: Enable a skill
      parameters:
        - name: skillId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated skill
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillDetailResponse"
        "404":
          description: Skill not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /skills/{skillId}/disable:
    post:
      operationId: disableSkill
      tags: [skills]
      summary: Disable a skill
      parameters:
        - name: skillId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated skill
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillDetailResponse"
        "404":
          description: Skill not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /skill-bundles:
    get:
      operationId: listSkillBundles
      tags: [skills]
      summary: List all skill bundles
      responses:
        "200":
          description: Bundle list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BundleListResponse"
    post:
      operationId: createSkillBundle
      tags: [skills]
      summary: Create a new skill bundle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBundleRequest"
      responses:
        "201":
          description: Bundle created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BundleResponse"
        "409":
          description: Slug already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /skill-bundles/seed:
    post:
      operationId: seedDefaultBundles
      tags: [skills]
      summary: Seed default bundles (internal helper, non-contractual)
      description: "Internal helper: idempotently seeds the four default skill bundles (floatr-builder/reviewer/debugger/team-studio) if they do not exist. Called automatically on server startup. Not part of the public API contract."
      responses:
        "200":
          description: Seed result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BundleListResponse"

  /skill-bundles/compile:
    post:
      operationId: compileBundle
      tags: [skills]
      summary: Compile a bundle from context
      description: Auto-selects the best bundle from context and compiles it. Pass bundleId to override.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompileBundleRequest"
      responses:
        "200":
          description: Compiled bundle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompiledBundleResult"
        "400":
          description: Invalid request or no bundle available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /skill-bundles/{bundleId}:
    get:
      operationId: getSkillBundle
      tags: [skills]
      summary: Get bundle details
      parameters:
        - name: bundleId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Bundle details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BundleResponse"
        "404":
          description: Bundle not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateSkillBundle
      tags: [skills]
      summary: Update a skill bundle
      parameters:
        - name: bundleId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBundleRequest"
      responses:
        "200":
          description: Updated bundle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BundleResponse"
        "404":
          description: Bundle not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /skill-bundles/{bundleId}/activate:
    post:
      operationId: activateSkillBundle
      tags: [skills]
      summary: Set a bundle as active for the next session launch
      parameters:
        - name: bundleId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActivateBundleRequest"
      responses:
        "200":
          description: Activation queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivateBundleResponse"
        "404":
          description: Bundle not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/{sessionId}/skills:
    get:
      operationId: getSessionSkills
      tags: [skills]
      summary: Get active skills for a session
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Session skill activations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionSkillsResponse"

  /sessions/{sessionId}/skills/feedback:
    post:
      operationId: submitSkillFeedback
      tags: [skills]
      summary: Submit feedback on a skill during a session
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SkillFeedbackRequest"
      responses:
        "201":
          description: Feedback recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillFeedbackResponse"
        "400":
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Skill not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/{sessionId}/repo/index:
    post:
      operationId: enqueueRepoIndex
      tags: [sessions]
      summary: Enqueue a repo indexing job
      description: Enqueues an async indexing job for the session's repository. Returns immediately with jobId and status. Deduplicates on active/queued jobs. Completed or error jobs trigger a full rebuild.
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RepoIndexRequest"
      responses:
        "202":
          description: Job enqueued (or existing active job returned)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RepoIndexResponse"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/{sessionId}/repo/fingerprint:
    get:
      operationId: getRepoFingerprint
      tags: [sessions]
      summary: Get repository fingerprint
      description: Returns detected languages, frameworks, monorepo flag, package manager, test tooling, and entry points. Populated by the Claw Runner after indexing.
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Repository fingerprint
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RepoFingerprintResponse"
        "404":
          description: Session not found or no index yet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/{sessionId}/repo/summary:
    get:
      operationId: getRepoSummary
      tags: [sessions]
      summary: Get repository architecture summary
      description: Returns a compact architecture sketch with major modules, hotspots, and test strategy.
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Repository summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RepoSummaryResponse"
        "404":
          description: Session not found or no summary yet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/{sessionId}/repo/search:
    get:
      operationId: searchRepo
      tags: [sessions]
      summary: Search the repository index
      description: Searches indexed files, symbols, and chunks. Each result includes combined, lexical, semantic, graph, and confidence scores.
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: integer
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [file, symbol, chunk]
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
        - name: lang
          in: query
          required: false
          schema:
            type: string
        - name: pathPrefix
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Search results with score breakdowns
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RepoSearchResponse"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/{sessionId}/repo/blast-radius:
    get:
      operationId: getRepoBlastRadius
      tags: [sessions]
      summary: Get blast radius for a file
      description: Returns direct dependents, likely affected tests, and related modules with confidence scores.
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: integer
        - name: file
          in: query
          required: true
          schema:
            type: string
          description: Relative file path within the repo
      responses:
        "200":
          description: Blast radius analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RepoBlastRadiusResponse"
        "404":
          description: Session not found or file not indexed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/{sessionId}/repo/symbol:
    get:
      operationId: getRepoSymbol
      tags: [sessions]
      summary: Look up a symbol in the repo index
      description: Returns symbol definition details. Accepts name, path, lang, and kind query params to disambiguate.
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: integer
        - name: name
          in: query
          required: false
          schema:
            type: string
        - name: path
          in: query
          required: false
          schema:
            type: string
        - name: lang
          in: query
          required: false
          schema:
            type: string
        - name: kind
          in: query
          required: false
          schema:
            type: string
            enum: [function, class, interface, type, variable, constant, enum, struct, import, export]
      responses:
        "200":
          description: Matching symbols
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RepoSymbolResponse"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/{sessionId}/repo/sync:
    post:
      operationId: syncRepoIndex
      tags: [sessions]
      summary: Instance callback — sync indexed repo data
      description: Called by the Claw Runner on the instance to push fingerprint, summary, symbols, and files into the cloud API. Authenticated with the same Bearer token as the status callback.
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RepoSyncRequest"
      responses:
        "200":
          description: Sync accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/{sessionId}/repo/jobs/{jobId}:
    get:
      operationId: getRepoJob
      tags: [sessions]
      summary: Get repo indexing job status
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: integer
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Job status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RepoJobStatus"
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

