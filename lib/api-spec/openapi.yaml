openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Cloud Coding Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: profiles
    description: GPU profile operations
  - name: sessions
    description: Coding session operations
  - name: templates
    description: Vast.ai template operations
  - name: offers
    description: GPU offer operations
  - name: scheduler
    description: Session scheduler configuration
  - name: skills
    description: Smart Skills library and bundle management
  - name: repo
    description: Repository intelligence — indexing, search, fingerprint, and blast radius
  - name: memory
    description: Cross-session memory governance — progressive-disclosure retrieval, contradiction detection, TTL/decay, ROI promotion, and budgeted retrieval profiles
  - name: coordination
    description: Team lane coordination — per-member lane overlays, ownership claims, conflict detection, handoff signals, and heavy-job scheduling
  - name: palette
    description: Command palette AI intent parsing — natural-language command resolution

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /profiles:
    get:
      operationId: listProfiles
      tags: [profiles]
      summary: List GPU profiles
      description: Returns all available GPU profiles with performance and cost estimates
      responses:
        "200":
          description: List of GPU profiles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GpuProfile"

  /profiles/{profileId}:
    get:
      operationId: getProfile
      tags: [profiles]
      summary: Get a GPU profile
      parameters:
        - name: profileId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: GPU profile details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GpuProfile"
        "404":
          description: Profile not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions:
    get:
      operationId: listSessions
      tags: [sessions]
      summary: List all sessions
      description: Returns all coding sessions with status and service URLs
      responses:
        "200":
          description: List of sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Session"
    post:
      operationId: createSession
      tags: [sessions]
      summary: Start a new coding session
      description: Provisions a Vast.ai instance with the selected GPU profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSessionRequest"
      responses:
        "201":
          description: Session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/{sessionId}:
    patch:
      operationId: updateSession
      tags: [sessions]
      summary: Update editable session fields
      description: Currently supports updating the natural-language intentText (the session "goal").
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSessionRequest"
      responses:
        "200":
          description: Updated session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: getSession
      tags: [sessions]
      summary: Get session details
      description: Returns session status, service URLs, and cost tracking
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Session details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteSession
      tags: [sessions]
      summary: Stop and destroy a session
      description: Destroys the Vast.ai instance and updates session status
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Session destroyed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/{sessionId}/clone:
    get:
      operationId: cloneSession
      tags: [sessions]
      summary: Get cloneable launch options from a previous session
      description: |
        Returns the launch options needed to re-create a similar session: profile,
        task mode, token mode, repo URL (if recoverable), intent text, and team-member
        names. Passwords and ownerToken are never returned. Read-only — no new
        session is created.
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Cloneable launch options
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CloneSessionResponse"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/active:
    get:
      operationId: getActiveSession
      tags: [sessions]
      summary: Get current active session
      description: Returns the currently running session if any
      responses:
        "200":
          description: Active session or null
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActiveSessionResponse"

  /sessions/{sessionId}/refresh:
    post:
      operationId: refreshSessionStatus
      tags: [sessions]
      summary: Refresh session status from Vast.ai
      description: Polls Vast.ai for the latest instance status and updates the session
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /templates:
    get:
      operationId: listTemplates
      tags: [templates]
      summary: List Vast.ai templates
      description: Returns all registered templates including the default
      responses:
        "200":
          description: List of templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Template"
    post:
      operationId: createTemplate
      tags: [templates]
      summary: Create a new template on Vast.ai
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTemplateRequest"
      responses:
        "201":
          description: Template created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Template"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /templates/{templateId}:
    get:
      operationId: getTemplate
      tags: [templates]
      summary: Get template details
      parameters:
        - name: templateId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Template details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Template"
        "404":
          description: Template not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateTemplate
      tags: [templates]
      summary: Update a template
      parameters:
        - name: templateId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTemplateRequest"
      responses:
        "200":
          description: Template updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Template"
        "404":
          description: Template not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteTemplate
      tags: [templates]
      summary: Delete a template
      parameters:
        - name: templateId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Template deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Template not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /offers:
    get:
      operationId: searchOffers
      tags: [offers]
      summary: Search GPU offers on Vast.ai
      description: Search available GPU machines with profile-aware filters
      parameters:
        - name: profileId
          in: query
          required: false
          schema:
            type: integer
          description: Filter offers by GPU profile
        - name: gpuName
          in: query
          required: false
          schema:
            type: string
          description: Filter by GPU name (e.g., RTX 4090)
        - name: numGpus
          in: query
          required: false
          schema:
            type: integer
          description: Minimum number of GPUs
        - name: maxPrice
          in: query
          required: false
          schema:
            type: number
          description: Maximum price per hour
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
          description: Max number of results
      responses:
        "200":
          description: List of GPU offers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GpuOffer"

  /scheduler:
    get:
      operationId: getSchedulerConfig
      tags: [scheduler]
      summary: Get scheduler configuration
      description: Returns the current session scheduler configuration
      responses:
        "200":
          description: Scheduler configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SchedulerConfig"
    put:
      operationId: updateSchedulerConfig
      tags: [scheduler]
      summary: Update scheduler configuration
      description: Updates the session scheduler configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSchedulerRequest"
      responses:
        "200":
          description: Updated scheduler configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SchedulerConfig"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [sessions]
      summary: Dashboard summary
      description: Returns summary stats for the dashboard
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /admin/claim-cleanup-stats:
    get:
      operationId: getClaimCleanupStats
      tags: [coordination]
      summary: Claim cleanup statistics
      description: Returns cumulative purge statistics and recent purge run history for the inactive-claim purge job.
      responses:
        "200":
          description: Claim cleanup stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClaimCleanupStats"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /skills:
    get:
      operationId: listSkills
      tags: [skills]
      summary: List all skills
      description: Returns imported skills and built-in skill metadata
      parameters:
        - name: class
          in: query
          schema:
            type: string
            enum: [doctrine, workflow, context, efficiency, team, repo]
        - name: trustTier
          in: query
          schema:
            type: string
            enum: [mizi_native, reviewed, user_approved, experimental]
        - name: reviewStatus
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 200
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Skills list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillsListResponse"

  /skills/import:
    post:
      operationId: importSkill
      tags: [skills]
      summary: Import skills from a GitHub repository
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportSkillRequest"
      responses:
        "201":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportSkillResponse"
        "400":
          description: Invalid URL or no skills found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /skills/compile-preview:
    post:
      operationId: compileSkillPreview
      tags: [skills]
      summary: Preview bundle compilation (internal helper, non-contractual)
      description: "Internal helper: compile a bundle against a context and return the raw base64 payload + byte size. Not part of the public API contract; use /skill-bundles/compile for the standard compile endpoint."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompilePreviewRequest"
      responses:
        "200":
          description: Compiled bundle preview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompilePreviewResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /skills/evals:
    get:
      operationId: listSkillEvals
      tags: [skills]
      summary: List eval runs
      description: "Returns all eval runs with optional status/type/task-mode filters."
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: status
          in: query
          schema:
            type: string
            enum: [queued, preparing, running, scoring, completed, error]
        - name: runType
          in: query
          schema:
            type: string
            enum: [baseline, skill, bundle, bundle_variant]
        - name: taskMode
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Eval runs list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvalRunListResponse"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /skills/evals/run:
    post:
      operationId: scheduleEvalRun
      tags: [skills]
      summary: Schedule an async eval run
      description: "Schedules a new eval run. Enforces daily budget and max-concurrent-job caps. Returns 429 when budget or concurrency limits are exceeded."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScheduleEvalRunRequest"
      responses:
        "202":
          description: Eval run scheduled (queued)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduleEvalRunResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Budget or concurrency limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /skills/evals/process-next:
    post:
      operationId: processNextQueuedEvalRun
      tags: [skills]
      summary: Manually trigger the eval worker to process the next queued run
      description: "Processes the oldest queued eval run respecting budget and concurrency limits. Useful for testing and manual intervention."
      responses:
        "200":
          description: Worker result
          content:
            application/json:
              schema:
                type: object
                properties:
                  processed:
                    type: boolean
                  runId:
                    type: integer
                    nullable: true
                  reason:
                    type: string
                    nullable: true
                required: [processed]
        "500":
          description: Worker error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /skills/evals/scoring-presets:
    get:
      operationId: getEvalScoringPresets
      tags: [skills]
      summary: Get task-mode scoring presets and budget config
      description: "Returns the explicit, inspectable scoring weight presets for each task mode plus the current eval budget config."
      responses:
        "200":
          description: Scoring presets and budget config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvalScoringPresetsResponse"

  /skills/evals/{runId}:
    get:
      operationId: getEvalRun
      tags: [skills]
      summary: Get an eval run with its variants
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Eval run with variants
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvalRunDetailResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /skills/evals/{runId}/variants:
    post:
      operationId: recordEvalVariant
      tags: [skills]
      summary: Record a variant result for an eval run
      description: "Records a baseline, treatment, or ablated variant for an in-progress eval run. Composite scores are computed automatically using the run's task-mode preset."
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecordEvalVariantRequest"
      responses:
        "201":
          description: Variant recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvalVariantResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Run not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /skills/evals/{runId}/finalize:
    post:
      operationId: finalizeEvalRun
      tags: [skills]
      summary: Finalize an eval run and apply contribution heuristics
      description: "Computes baseline-vs-treatment lift, updates per-skill and per-bundle aggregates, and marks the run completed."
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Run finalized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvalRunFinalizeResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /skills/evals/{runId}/status:
    patch:
      operationId: updateEvalRunStatus
      tags: [skills]
      summary: Advance an eval run's status
      description: "Advances the run through queued → preparing → running → scoring → completed|error. Yields (429) if a heavy interactive job is active."
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEvalRunStatusRequest"
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvalRunResponse"
        "429":
          description: Yielded — interactive heavy job is active
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /skills/discover:
    post:
      operationId: discoverSkills
      tags: [skills]
      summary: Discover skills from external registries (not yet available)
      responses:
        "501":
          description: Not implemented
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotImplementedResponse"

  /skills/leaderboard:
    get:
      operationId: getSkillLeaderboard
      tags: [skills]
      summary: Skill leaderboard — top skills by measured lift and regression risk
      description: "Returns top skills by eval-measured lift and skills with negative lift or regression risk. Backed by stored eval data."
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: taskMode
          in: query
          schema:
            type: string
        - name: minConfidence
          in: query
          schema:
            type: number
            format: float
            default: 0.10
      responses:
        "200":
          description: Skill leaderboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillLeaderboardResponse"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /skills/feedback-scores:
    get:
      operationId: getSkillFeedbackScores
      tags: [skills]
      summary: Get aggregated feedback scores for all skills
      responses:
        "200":
          description: Feedback scores
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillFeedbackScoresResponse"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /skills/{skillId}:
    get:
      operationId: getSkill
      tags: [skills]
      summary: Get skill details and version history
      parameters:
        - name: skillId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Skill with versions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillDetailResponse"
        "404":
          description: Skill not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /skills/{skillId}/performance:
    get:
      operationId: getSkillPerformance
      tags: [skills]
      summary: Get eval performance data for a specific skill
      description: "Returns per-skill eval aggregate (lift counts, confidence, contribution) and recent eval runs."
      parameters:
        - name: skillId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Skill performance data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillPerformanceResponse"
        "404":
          description: Skill not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /skills/{skillId}/review:
    post:
      operationId: reviewSkill
      tags: [skills]
      summary: Approve or reject a skill
      parameters:
        - name: skillId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewSkillRequest"
      responses:
        "200":
          description: Updated skill
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillDetailResponse"
        "404":
          description: Skill not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /skills/{skillId}/enable:
    post:
      operationId: enableSkill
      tags: [skills]
      summary: Enable a skill
      parameters:
        - name: skillId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated skill
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillDetailResponse"
        "404":
          description: Skill not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /skills/{skillId}/disable:
    post:
      operationId: disableSkill
      tags: [skills]
      summary: Disable a skill
      parameters:
        - name: skillId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated skill
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillDetailResponse"
        "404":
          description: Skill not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /skills/{skillId}/feedback/{feedbackId}:
    delete:
      operationId: deleteSkillFeedbackEntry
      tags: [skills]
      summary: Delete a specific feedback entry for a skill
      parameters:
        - name: skillId
          in: path
          required: true
          schema:
            type: integer
        - name: feedbackId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Entry deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Feedback entry not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /skills/{skillId}/feedback:
    get:
      operationId: getSkillFeedbackHistory
      tags: [skills]
      summary: Get feedback history for a specific skill
      parameters:
        - name: skillId
          in: path
          required: true
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 200
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Feedback history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillFeedbackHistoryResponse"
        "404":
          description: Skill not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: clearAllSkillFeedback
      tags: [skills]
      summary: Clear all feedback for a skill
      description: Permanently deletes all feedback entries for the given skill.
      parameters:
        - name: skillId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Feedback cleared
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  deletedCount:
                    type: integer
                required: [success, deletedCount]
        "404":
          description: Skill not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /skill-bundles/leaderboard:
    get:
      operationId: getBundleLeaderboard
      tags: [skills]
      summary: Bundle leaderboard — top bundles by measured lift
      description: "Returns top bundles overall and by task mode / token mode / repo kind / model family. Backed by stored eval data."
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: taskMode
          in: query
          schema:
            type: string
        - name: tokenMode
          in: query
          schema:
            type: string
        - name: repoKind
          in: query
          description: Filter to bundles that have been evaluated on this repo kind (e.g. monorepo, library, service)
          schema:
            type: string
        - name: modelFamily
          in: query
          description: Filter to bundles evaluated with this model family (e.g. kimi, openai, anthropic, google, meta, deepseek, mistral)
          schema:
            type: string
      responses:
        "200":
          description: Bundle leaderboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BundleLeaderboardResponse"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /skill-bundles:
    get:
      operationId: listSkillBundles
      tags: [skills]
      summary: List all skill bundles
      responses:
        "200":
          description: Bundle list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BundleListResponse"
    post:
      operationId: createSkillBundle
      tags: [skills]
      summary: Create a new skill bundle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBundleRequest"
      responses:
        "201":
          description: Bundle created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BundleResponse"
        "409":
          description: Slug already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /skill-bundles/seed:
    post:
      operationId: seedDefaultBundles
      tags: [skills]
      summary: Seed default bundles (internal helper, non-contractual)
      description: "Internal helper: idempotently seeds the four default skill bundles (mizi-builder/reviewer/debugger/team-studio) if they do not exist. Called automatically on server startup. Not part of the public API contract."
      responses:
        "200":
          description: Seed result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BundleListResponse"

  /skill-bundles/compile:
    post:
      operationId: compileBundle
      tags: [skills]
      summary: Compile a bundle from context
      description: Auto-selects the best bundle from context and compiles it. Pass bundleId to override.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompileBundleRequest"
      responses:
        "200":
          description: Compiled bundle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompiledBundleResult"
        "400":
          description: Invalid request or no bundle available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /skill-bundles/{bundleId}:
    get:
      operationId: getSkillBundle
      tags: [skills]
      summary: Get bundle details
      parameters:
        - name: bundleId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Bundle details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BundleResponse"
        "404":
          description: Bundle not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateSkillBundle
      tags: [skills]
      summary: Update a skill bundle
      parameters:
        - name: bundleId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBundleRequest"
      responses:
        "200":
          description: Updated bundle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BundleResponse"
        "404":
          description: Bundle not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /skill-bundles/{bundleId}/performance:
    get:
      operationId: getBundlePerformance
      tags: [skills]
      summary: Get eval performance data for a specific bundle
      description: "Returns per-bundle eval aggregate (run count, avg scores, avg lift, confidence) and recent eval runs."
      parameters:
        - name: bundleId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Bundle performance data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BundlePerformanceResponse"
        "404":
          description: Bundle not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /skill-bundles/{bundleId}/activate:
    post:
      operationId: activateSkillBundle
      tags: [skills]
      summary: Set a bundle as active for the next session launch
      parameters:
        - name: bundleId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActivateBundleRequest"
      responses:
        "200":
          description: Activation queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivateBundleResponse"
        "404":
          description: Bundle not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/{sessionId}/skills:
    get:
      operationId: getSessionSkills
      tags: [skills]
      summary: Get active skills for a session
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Session skill activations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionSkillsResponse"

  /sessions/{sessionId}/skills/feedback:
    post:
      operationId: submitSkillFeedback
      tags: [skills]
      summary: Submit feedback on a skill during a session
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SkillFeedbackRequest"
      responses:
        "201":
          description: Feedback recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillFeedbackResponse"
        "400":
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Skill not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/{sessionId}/skills/complete-feedback:
    post:
      operationId: sessionCompleteFeedback
      tags: [skills]
      summary: Record implicit per-skill feedback at session completion
      description: "Processes bytesAvoided and taskSuccessScore to generate implicit positive/negative signals for all skills active in the session."
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionCompleteFeedbackRequest"
      responses:
        "200":
          description: Feedback recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionCompleteFeedbackResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No skill activation found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/{sessionId}/routing-stats:
    get:
      operationId: getSessionRoutingStats
      tags: [sessions]
      summary: Get stored routing stats for a session
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Routing stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionRoutingStatsResponse"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/repo/status:
    get:
      operationId: getBatchRepoStatus
      tags: [sessions]
      summary: Batch repo index status for multiple sessions
      description: Returns a map of sessionId → {indexStatus, isStale, confidenceLevel} in a single DB query. Use this instead of calling the per-session summary endpoint N times when rendering a sessions list.
      parameters:
        - name: ids
          in: query
          required: true
          schema:
            type: string
          description: Comma-separated list of session IDs (max 100)
          example: "1,2,3"
      responses:
        "200":
          description: Map of session ID to repo status entry (sessions with no repo context are omitted)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RepoStatusBatchResponse"
        "400":
          description: Missing or invalid ids parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/{sessionId}/repo/index:
    post:
      operationId: enqueueRepoIndex
      tags: [sessions]
      summary: Enqueue a repo indexing job
      description: Enqueues an async indexing job for the session's repository. Returns immediately with jobId and status. Deduplicates on active/queued jobs. Completed or error jobs trigger a full rebuild.
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RepoIndexRequest"
      responses:
        "202":
          description: Job enqueued (or existing active job returned)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RepoIndexResponse"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/{sessionId}/repo/fingerprint:
    get:
      operationId: getRepoFingerprint
      tags: [sessions]
      summary: Get repository fingerprint
      description: Returns detected languages, frameworks, monorepo flag, package manager, test tooling, and entry points. Populated by the Claw Runner after indexing.
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Repository fingerprint
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RepoFingerprintResponse"
        "404":
          description: Session not found or no index yet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/{sessionId}/repo/summary:
    get:
      operationId: getRepoSummary
      tags: [sessions]
      summary: Get repository architecture summary
      description: Returns a compact architecture sketch with major modules, hotspots, and test strategy.
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Repository summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RepoSummaryResponse"
        "404":
          description: Session not found or no summary yet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/{sessionId}/repo/search:
    get:
      operationId: searchRepo
      tags: [sessions]
      summary: Search the repository index
      description: Searches indexed files, symbols, and chunks. Each result includes combined, lexical, semantic, graph, and confidence scores.
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: integer
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [file, symbol, chunk]
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
        - name: lang
          in: query
          required: false
          schema:
            type: string
        - name: pathPrefix
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Search results with score breakdowns
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RepoSearchResponse"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/{sessionId}/repo/blast-radius:
    get:
      operationId: getRepoBlastRadius
      tags: [sessions]
      summary: Get blast radius for a file
      description: Returns direct dependents, likely affected tests, and related modules with confidence scores.
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: integer
        - name: file
          in: query
          required: true
          schema:
            type: string
          description: Relative file path within the repo
      responses:
        "200":
          description: Blast radius analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RepoBlastRadiusResponse"
        "404":
          description: Session not found or file not indexed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/{sessionId}/repo/symbol:
    get:
      operationId: getRepoSymbol
      tags: [sessions]
      summary: Look up a symbol in the repo index
      description: Returns symbol definition details. Accepts name, path, lang, and kind query params to disambiguate.
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: integer
        - name: name
          in: query
          required: false
          schema:
            type: string
        - name: path
          in: query
          required: false
          schema:
            type: string
        - name: lang
          in: query
          required: false
          schema:
            type: string
        - name: kind
          in: query
          required: false
          schema:
            type: string
            enum: [function, class, interface, type, variable, constant, enum, struct, import, export]
      responses:
        "200":
          description: Matching symbols
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RepoSymbolResponse"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/{sessionId}/repo/sync:
    post:
      operationId: syncRepoIndex
      tags: [sessions]
      summary: Instance callback — sync indexed repo data
      description: Called by the Claw Runner on the instance to push fingerprint, summary, symbols, and files into the cloud API. Authenticated with the same Bearer token as the status callback.
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RepoSyncRequest"
      responses:
        "200":
          description: Sync accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/{sessionId}/repo/jobs/{jobId}:
    get:
      operationId: getRepoJob
      tags: [sessions]
      summary: Get repo indexing job status
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: integer
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Job status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RepoJobStatus"
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /mem/index:
    get:
      operationId: memoryIndex
      tags: [memory]
      summary: "Layer 1 — memory index (tiny high-ROI shortlist)"
      description: "Returns the top-N highest-ROI memory items for a user. Layer 1 is always available regardless of token mode. Use this first before escalating to search."
      parameters:
        - name: userId
          in: query
          required: true
          schema:
            type: string
        - name: tokenMode
          in: query
          required: false
          schema:
            type: string
            enum: [full, core, lean, ultra]
            default: core
        - name: scope
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MemoryScope"
        - name: sessionType
          in: query
          required: false
          schema:
            type: string
            enum: [team, solo]
          description: "Drives retrieval scope ordering: 'team' prioritises lane_user/repo_shared first."
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Memory index result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryIndexResponse"
        "400":
          description: Missing userId
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /mem/search:
    get:
      operationId: memorySearchItems
      tags: [memory]
      summary: "Layer 2 — memory search (richer filtered set)"
      description: "Full-text search over memory items with scope and type filters. Layer 2 is restricted in lean/ultra token modes."
      parameters:
        - name: userId
          in: query
          required: true
          schema:
            type: string
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: tokenMode
          in: query
          required: false
          schema:
            type: string
            enum: [full, core, lean, ultra]
            default: core
        - name: scope
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MemoryScope"
        - name: sessionType
          in: query
          required: false
          schema:
            type: string
            enum: [team, solo]
          description: "Drives retrieval scope ordering: 'team' prioritises lane_user/repo_shared first."
        - name: memoryType
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MemoryType"
        - name: includeStale
          in: query
          required: false
          schema:
            type: boolean
            default: false
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemorySearchResponse"
        "400":
          description: Missing userId or q
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /mem/item:
    post:
      operationId: saveMemoryItem
      tags: [memory]
      summary: Save a memory item with contradiction check
      description: "Saves a new memory item and runs automatic lexical contradiction detection against the same scope. Returns conflicting item IDs if any. Saves are never blocked — contradictions are flagged without preventing the write."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveMemoryItemRequest"
      responses:
        "201":
          description: Item saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaveMemoryItemResponse"
        "400":
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /mem/item/{itemId}:
    get:
      operationId: getMemoryItem
      tags: [memory]
      summary: "Layer 3 — get full memory item (escalation required)"
      description: "Returns the full memory item by ID. Layer 3 requires escalate=true in lean/ultra modes."
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
        - name: userId
          in: query
          required: true
          schema:
            type: string
        - name: tokenMode
          in: query
          required: false
          schema:
            type: string
            enum: [full, core, lean, ultra]
            default: core
        - name: escalate
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: "Set to true to explicitly escalate to Layer 3. Required in lean/ultra modes."
      responses:
        "200":
          description: Memory item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryGetResponse"
        "403":
          description: Layer 3 access requires escalation in this token mode
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Item not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /mem/item/{itemId}/promote:
    patch:
      operationId: reverseMemoryPromotion
      tags: [memory]
      summary: Promote or demote a memory item
      description: "Manually set the promotion_status of a memory item. Set to 'promoted' to confirm a candidate, 'demoted' to reverse a promotion (restores original type if promoted_from is set), or 'none' to clear promotion state."
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
        - name: userId
          in: query
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                promotionStatus:
                  $ref: "#/components/schemas/PromotionStatus"
                notes:
                  type: string
                  description: Optional note explaining the reason for this promotion status change.
              required:
                - promotionStatus
      responses:
        "200":
          description: Promotion status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromotionUpdateResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Item not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /mem/items:
    get:
      operationId: listMemoryItems
      tags: [memory]
      summary: List memory items
      parameters:
        - name: userId
          in: query
          required: true
          schema:
            type: string
        - name: scope
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MemoryScope"
        - name: memoryType
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MemoryType"
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
            maximum: 200
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Memory items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryItemsListResponse"

  /mem/injected:
    post:
      operationId: markMemoryInjected
      tags: [memory]
      summary: Track memory items injected into context
      description: "Updates injection_count for the specified items, which feeds ROI scoring and auto-promotion. Call this after injecting memory items into a model context window."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userId:
                  type: string
                  description: "Owner of the items — used to scope updates and prevent cross-tenant counter manipulation."
                itemIds:
                  type: array
                  items:
                    type: integer
              required:
                - userId
                - itemIds
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /mem/symbol-stale:
    post:
      operationId: markSymbolStale
      tags: [memory]
      summary: Mark memory items linked to a symbol as stale
      description: "Called when a symbol's content hash changes (e.g., after a file edit). Items linked to the symbol via symbol_ref are marked stale and demoted for injection."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userId:
                  type: string
                  description: "Caller's user ID — scopes staleness to this tenant's items only"
                symbolRef:
                  type: string
                newContentHash:
                  type: string
              required:
                - userId
                - symbolRef
                - newContentHash
      responses:
        "200":
          description: Staleness marking result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarkStaleResponse"

  /mem/conflicts:
    get:
      operationId: listMemoryConflicts
      tags: [memory]
      summary: List contradiction / conflict groups
      parameters:
        - name: userId
          in: query
          required: true
          schema:
            type: string
        - name: conflictStatus
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ConflictStatus"
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Conflict groups with their items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryConflictsResponse"

  /mem/conflicts/{groupId}:
    patch:
      operationId: updateMemoryConflictStatus
      tags: [memory]
      summary: Update conflict group status
      description: "Update the resolution status of a conflict group. Setting resolved also updates all member items."
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
        - name: userId
          in: query
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                conflictStatus:
                  $ref: "#/components/schemas/ConflictStatus"
              required:
                - conflictStatus
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConflictStatusUpdateResponse"
        "404":
          description: Conflict group not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /mem/stale:
    get:
      operationId: listStaleMemoryItems
      tags: [memory]
      summary: List stale memory items
      description: "Returns items that are stale by stale_status or TTL expiry. Stale items are searchable but deprioritized for injection."
      parameters:
        - name: userId
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Stale items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryStaleResponse"

  /mem/promotions:
    get:
      operationId: getMemoryPromotionHistory
      tags: [memory]
      summary: Get promotion history
      description: "Returns auto-promotion audit log entries. Items are promoted from note→convention or warning→guardrail when ROI thresholds are met."
      parameters:
        - name: userId
          in: query
          required: true
          schema:
            type: string
        - name: itemId
          in: query
          required: false
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Promotion history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryPromotionHistoryResponse"

  /mem/stats:
    get:
      operationId: getMemoryGovernanceStats
      tags: [memory]
      summary: Memory governance observability stats
      description: "Returns stale count, contradiction count, promotion count, layer usage, average injected tokens, hit rate, and the active budget profile for the given token mode."
      parameters:
        - name: userId
          in: query
          required: true
          schema:
            type: string
        - name: tokenMode
          in: query
          required: false
          schema:
            type: string
            enum: [full, core, lean, ultra]
            default: core
      responses:
        "200":
          description: Governance statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryGovernanceStatsResponse"

  /sessions/{id}/lanes:
    get:
      operationId: listSessionLanes
      tags: [coordination]
      summary: List all lanes for a session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Lanes list with claims and policies
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LaneListResponse"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createSessionLane
      tags: [coordination]
      summary: Create a new lane for a team member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLaneRequest"
      responses:
        "201":
          description: Lane created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LaneWithPolicy"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/{id}/lanes/{laneId}:
    put:
      operationId: updateSessionLane
      tags: [coordination]
      summary: Update a lane's status, type, or task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: laneId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLaneRequest"
      responses:
        "200":
          description: Lane updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LaneResponse"
        "404":
          description: Lane not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/{id}/lanes/{laneId}/claim:
    post:
      operationId: createLaneClaim
      tags: [coordination]
      summary: Softly claim a file, module, symbol, or task for a lane
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: laneId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClaimRequest"
      responses:
        "201":
          description: Claim created with any overlap warnings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClaimResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Lane not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/{id}/lanes/{laneId}/claim/{claimId}:
    delete:
      operationId: releaseLaneClaim
      tags: [coordination]
      summary: Release a claim or refresh its heartbeat
      description: "Without ?heartbeat=true: releases the claim. With ?heartbeat=true: refreshes the claim heartbeat and expiry."
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: laneId
          in: path
          required: true
          schema:
            type: integer
        - name: claimId
          in: path
          required: true
          schema:
            type: integer
        - name: heartbeat
          in: query
          required: false
          schema:
            type: boolean
          description: If true, refreshes heartbeat instead of releasing
        - name: ttlSeconds
          in: query
          required: false
          schema:
            type: integer
          description: New TTL when doing a heartbeat refresh
      responses:
        "200":
          description: Claim released or heartbeat refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClaimReleaseResponse"
        "404":
          description: Claim not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/{id}/lanes/{laneId}/handoff:
    post:
      operationId: createLaneHandoff
      tags: [coordination]
      summary: Signal a handoff state from one lane to others
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: laneId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateHandoffRequest"
      responses:
        "201":
          description: Handoff signal created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HandoffResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Lane not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/{id}/lanes/{laneId}/handoff/{handoffId}:
    patch:
      operationId: acknowledgeLaneHandoff
      tags: [coordination]
      summary: Acknowledge or dismiss a handoff signal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: laneId
          in: path
          required: true
          schema:
            type: integer
        - name: handoffId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcknowledgeHandoffRequest"
      responses:
        "200":
          description: Handoff signal updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HandoffResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Handoff or lane not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/{id}/coordination:
    get:
      operationId: getSessionCoordination
      tags: [coordination]
      summary: Get full coordination state for a session
      description: Returns all active lanes, current tasks, claims, and recent handoffs
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Session coordination state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoordinationStateResponse"
        "400":
          description: Invalid session ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/{id}/conflicts:
    get:
      operationId: getSessionConflicts
      tags: [coordination]
      summary: Detect overlap and blast-radius conflicts across active lanes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conflict analysis results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConflictListResponse"
        "400":
          description: Invalid session ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/{id}/heavy-jobs:
    post:
      operationId: enqueueHeavyJob
      tags: [coordination]
      summary: Schedule a GPU-expensive coordination job in the weighted fair queue
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnqueueHeavyJobRequest"
      responses:
        "201":
          description: Job enqueued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HeavyJobResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: listHeavyJobs
      tags: [coordination]
      summary: List heavy jobs for a session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: status
          in: query
          required: false
          schema:
            type: string
          description: "Comma-separated status filter: queued, running, deferred, completed, failed"
      responses:
        "200":
          description: Heavy jobs list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HeavyJobListResponse"

  /sessions/{id}/heavy-jobs/{jobId}:
    patch:
      operationId: updateHeavyJobStatus
      tags: [coordination]
      summary: Update a heavy job status (running / completed / failed / deferred)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateHeavyJobRequest"
      responses:
        "200":
          description: Job updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HeavyJobResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /palette/intent:
    post:
      operationId: resolvePaletteIntent
      tags: [palette]
      summary: Resolve a natural-language command palette query into a structured action
      description: |
        Accepts a free-text user query from the command palette plus current
        context (route, active session, recent sessions) and returns a
        structured action the client can execute — navigate, mutate (stop /
        re-index), or copy. Returns an explanatory error message when the
        query cannot be parsed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaletteIntentRequest"
      responses:
        "200":
          description: Resolved intent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaletteIntentResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: LLM or server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:

    PaletteIntentRequest:
      type: object
      description: Natural-language command palette query with current app context
      properties:
        query:
          type: string
          description: The raw text the user typed into the command palette
          minLength: 1
          maxLength: 500
        context:
          type: object
          description: Current app context to help the LLM resolve ambiguous commands
          properties:
            route:
              type: string
              description: Current client-side route (e.g. "/sessions/42")
            activeSessionId:
              type: integer
              nullable: true
              description: ID of the currently active session, if any
            activeSessionStatus:
              type: string
              nullable: true
              description: Status of the active session (ready, starting, stopped, etc.)
            recentSessionIds:
              type: array
              items:
                type: integer
              description: IDs of the 8 most-recent sessions shown in the quick-jump list
          required: [route]
      required: [query, context]

    PaletteIntentResponse:
      type: object
      description: Structured action resolved from the natural-language query
      properties:
        ok:
          type: boolean
          description: Whether the query was successfully parsed into an actionable intent
        action:
          type: string
          nullable: true
          description: |
            Action type to execute on the client:
            - navigate — push a new route
            - stop-session — dispatch mizi:request-stop-session
            - reindex-session — trigger a repo re-index for the given sessionId
            - new-session — open the launch dialog
            - relaunch-session — relaunch the given sessionId
            - copy-ssh — copy SSH command for the given sessionId
          enum: [navigate, stop-session, reindex-session, new-session, relaunch-session, copy-ssh]
        payload:
          type: object
          nullable: true
          description: Action-specific payload
          properties:
            route:
              type: string
              nullable: true
              description: Route to navigate to (for action=navigate)
            sessionId:
              type: integer
              nullable: true
              description: Target session ID (for session-specific actions)
          additionalProperties: true
        explanation:
          type: string
          description: Human-readable description of what will happen (shown in toast) or error reason on failure
      required: [ok, explanation]

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success

    GpuProfile:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        displayName:
          type: string
        gpuName:
          type: string
        numGpus:
          type: integer
        totalVram:
          type: integer
        dockerImageTag:
          type: string
        defaultQuant:
          type: string
        quantSizeGb:
          type: integer
        diskSizeGb:
          type: integer
        estimatedSpeedMin:
          type: number
        estimatedSpeedMax:
          type: number
        estimatedCostMin:
          type: number
        estimatedCostMax:
          type: number
        llamaCtxSize:
          type: integer
        llamaBatchSize:
          type: integer
        llamaExtraArgs:
          type: string
        searchParams:
          type: object
        startupTimeMin:
          type: integer
          description: Estimated startup time in minutes (first launch)
        modelRepo:
          type: string
          description: HuggingFace model repository to download on the instance
        servedModelName:
          type: string
          description: Model name used for the vLLM --served-model-name flag and litellm alias
        modelDisplayName:
          type: string
          description: Human-readable model name shown in the dashboard
        swarmWorkerCap:
          type: integer
          nullable: true
          description: Maximum concurrent swarm workers this profile can support (null means not configured)
        benchmarkCallout:
          type: string
          nullable: true
          description: Short benchmark callout shown in the Quick Launch section header (e.g. "65.8% SWE-Bench Verified")
      required:
        - id
        - name
        - displayName
        - gpuName
        - numGpus
        - totalVram
        - dockerImageTag
        - defaultQuant
        - quantSizeGb
        - diskSizeGb
        - estimatedSpeedMin
        - estimatedSpeedMax
        - estimatedCostMin
        - estimatedCostMax
        - llamaCtxSize
        - llamaBatchSize
        - searchParams
        - startupTimeMin
        - modelRepo
        - servedModelName
        - modelDisplayName

    TeamMember:
      type: object
      properties:
        name:
          type: string
        password:
          type: string
          nullable: true
          description: Only present on GET /sessions/:id (detail). Omitted from list responses.
        path:
          type: string
        ideUrl:
          type: string
          nullable: true
      required:
        - name
        - path

    Session:
      type: object
      properties:
        id:
          type: integer
        profileId:
          type: integer
        profileName:
          type: string
        vastInstanceId:
          type: integer
          nullable: true
        vastOfferId:
          type: integer
          nullable: true
        templateHash:
          type: string
          nullable: true
        status:
          type: string
          enum: [pending, provisioning, downloading, starting, ready, stopping, stopped, error]
        statusMessage:
          type: string
          nullable: true
        theiaUrl:
          type: string
          nullable: true
        codeServerUrl:
          type: string
          nullable: true
        previewUrl:
          type: string
          nullable: true
        sshHost:
          type: string
          nullable: true
        sshPort:
          type: integer
          nullable: true
        publicIp:
          type: string
          nullable: true
        costPerHour:
          type: number
          nullable: true
        totalCost:
          type: number
          nullable: true
        gpuName:
          type: string
          nullable: true
        numGpus:
          type: integer
          nullable: true
        startedAt:
          type: string
          format: date-time
          nullable: true
        stoppedAt:
          type: string
          format: date-time
          nullable: true
        teamMembers:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/TeamMember"
        taskMode:
          type: string
          nullable: true
          description: "Task mode used for Smart Skills selection (build, review, debug, refactor, explore, team)"
        tokenMode:
          type: string
          nullable: true
          description: "Token mode used for context budgeting (full, core, lean, ultra)"
        activeBundleId:
          type: integer
          nullable: true
          description: Active Smart Skills bundle ID
        intentText:
          type: string
          nullable: true
          description: Plain-English description of what the user is trying to accomplish in this session (set at launch, editable mid-session).
        hasGithubToken:
          type: boolean
          description: Whether a GitHub PAT was provided at launch (token itself is not stored).
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - profileId
        - profileName
        - status
        - createdAt
        - updatedAt

    ActiveSessionResponse:
      type: object
      properties:
        session:
          $ref: "#/components/schemas/Session"
          nullable: true
      required:
        - session

    UpdateSessionRequest:
      type: object
      properties:
        intentText:
          type: string
          nullable: true
          description: Updated plain-English session intent (max 500 chars). Pass null or empty string to clear.

    CloneSessionResponse:
      type: object
      description: Read-only snapshot of the launch options from a prior session, ready to pre-fill a new launch dialog.
      properties:
        sessionId:
          type: integer
          description: ID of the source session being cloned from.
        profileId:
          type: integer
        profileName:
          type: string
          nullable: true
        taskMode:
          type: string
          nullable: true
        tokenMode:
          type: string
          nullable: true
        bundleId:
          type: integer
          nullable: true
          description: The Smart Skills bundle that was active on the source session, if any.
        repoUrl:
          type: string
          nullable: true
