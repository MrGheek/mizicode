          enum: [file, symbol, chunk]
        path:
          type: string
        name:
          type: string
          nullable: true
        lang:
          type: string
          nullable: true
        kind:
          type: string
          nullable: true
        snippet:
          type: string
          nullable: true
        line:
          type: integer
          nullable: true
        scores:
          type: object
          properties:
            combined:
              type: number
            lexical:
              type: number
            semantic:
              type: number
            graph:
              type: number
            confidence:
              type: number
          required:
            - combined
            - lexical
            - semantic
            - graph
            - confidence
      required:
        - type
        - path
        - scores

    RepoSearchResponse:
      type: object
      properties:
        sessionId:
          type: integer
        q:
          type: string
        total:
          type: integer
        indexStatus:
          type: string
        isStale:
          type: boolean
        confidenceLevel:
          type: string
        results:
          type: array
          items:
            $ref: "#/components/schemas/RepoSearchResult"
      required:
        - sessionId
        - q
        - total
        - indexStatus
        - isStale
        - confidenceLevel
        - results

    RepoBlastRadiusItem:
      type: object
      properties:
        path:
          type: string
        relation:
          type: string
          description: "direct_dependent | affected_test | related_module"
