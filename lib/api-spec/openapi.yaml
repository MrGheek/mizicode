          type: number
        dependencyDegree:
          type: integer
        fileSizeBytes:
          type: integer
        lang:
          type: string
          nullable: true
      required:
        - path
        - score

    RepoModule:
      type: object
      properties:
        name:
          type: string
        path:
          type: string
        fileCount:
          type: integer
        primaryLang:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
      required:
        - name
        - path
        - fileCount

    RepoSummaryData:
      type: object
      properties:
        architectureSketch:
          type: string
        majorModules:
          type: array
          items:
            $ref: "#/components/schemas/RepoModule"
        hotspots:
          type: array
          items:
            $ref: "#/components/schemas/RepoHotspot"
        testStrategy:
          type: string
          nullable: true
        graphDensity:
          type: number
          nullable: true
        complexityClass:
          type: string
          nullable: true
          description: "low | medium | high | very-high"
