          type: number
      required:
        - path
        - relation
        - confidence

    RepoBlastRadiusResponse:
      type: object
      properties:
        sessionId:
          type: integer
        file:
          type: string
        indexStatus:
          type: string
        isStale:
          type: boolean
        directDependents:
          type: array
          items:
            $ref: "#/components/schemas/RepoBlastRadiusItem"
        affectedTests:
          type: array
          items:
            $ref: "#/components/schemas/RepoBlastRadiusItem"
        relatedModules:
          type: array
          items:
            $ref: "#/components/schemas/RepoBlastRadiusItem"
        overallConfidence:
          type: number
      required:
        - sessionId
        - file
        - indexStatus
        - isStale
        - directDependents
        - affectedTests
        - relatedModules
        - overallConfidence

    RepoSymbolItem:
      type: object
      properties:
        name:
          type: string
        kind:
          type: string
        path:
          type: string
        line:
          type: integer
          nullable: true
        lang:
          type: string
          nullable: true
        signature:
          type: string
          nullable: true
        docstring:
          type: string
          nullable: true
        callers:
          type: array
          items:
            type: string
        callees:
          type: array
          items:
            type: string
      required:
        - name
        - kind
        - path
        - callers
        - callees

    RepoSymbolResponse:
      type: object
      properties:
        sessionId:
          type: integer
        indexStatus:
          type: string
        isStale:
          type: boolean
        symbols:
          type: array
          items:
            $ref: "#/components/schemas/RepoSymbolItem"
        total:
          type: integer
      required:
        - sessionId
        - indexStatus
        - isStale
        - symbols
        - total

    RepoSyncRequest:
      type: object
      properties:
        jobId:
          type: integer
        status:
          type: string
        repoPath:
          type: string
        fingerprintHash:
          type: string
          nullable: true
        fingerprint:
          type: object
          additionalProperties: true
          nullable: true
        summary:
          type: object
          additionalProperties: true
          nullable: true
        symbols:
          type: array
          items:
            type: object
            additionalProperties: true
          nullable: true
          description: Top symbols for cloud-side search approximation (max 500)
        files:
          type: array
          items:
            type: object
            additionalProperties: true
          nullable: true
          description: Top files with metadata for cloud-side search approximation (max 500)
        edges:
          type: array
          items:
            type: object
            additionalProperties: true
          nullable: true
          description: Import/caller edges for blast-radius approximation (max 2000)
        chunks:
          type: array
          items:
            type: object
            properties:
              path:
                type: string
              lang:
                type: string
                nullable: true
              content:
                type: string
                description: Code snippet (capped at 1500 chars)
              startLine:
                type: integer
              endLine:
                type: integer
              symbolName:
                type: string
                nullable: true
              symbolKind:
                type: string
                nullable: true
          nullable: true
          description: Code chunks (function/class bodies) for semantic retrieval (max 500)
        indexedSymbols:
          type: integer
          nullable: true
        edgeCount:
          type: integer
          nullable: true
        durationMs:
          type: integer
          nullable: true
        errorDetails:
          type: string
          nullable: true
      required:
        - jobId
        - status
        - repoPath
