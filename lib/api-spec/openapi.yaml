          type: integer
        totalQueuedJobs:
          type: integer
        pendingHandoffs:
          type: integer
        recentHandoffs:
          type: array
          items:
            $ref: "#/components/schemas/HandoffResponse"
      required: [sessionId, lanes, totalActiveClaims, totalQueuedJobs, pendingHandoffs, recentHandoffs]

