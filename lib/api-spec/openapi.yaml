openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Cloud Coding Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: profiles
    description: GPU profile operations
  - name: sessions
    description: Coding session operations
  - name: templates
    description: Vast.ai template operations
  - name: offers
    description: GPU offer operations
  - name: scheduler
    description: Session scheduler configuration
  - name: skills
    description: Smart Skills library and bundle management

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /profiles:
    get:
      operationId: listProfiles
      tags: [profiles]
      summary: List GPU profiles
      description: Returns all available GPU profiles with performance and cost estimates
      responses:
        "200":
          description: List of GPU profiles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GpuProfile"

  /profiles/{profileId}:
    get:
      operationId: getProfile
      tags: [profiles]
      summary: Get a GPU profile
      parameters:
        - name: profileId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: GPU profile details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GpuProfile"
        "404":
          description: Profile not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions:
    get:
      operationId: listSessions
      tags: [sessions]
      summary: List all sessions
      description: Returns all coding sessions with status and service URLs
      responses:
        "200":
          description: List of sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Session"
    post:
      operationId: createSession
      tags: [sessions]
      summary: Start a new coding session
      description: Provisions a Vast.ai instance with the selected GPU profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSessionRequest"
      responses:
        "201":
          description: Session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/{sessionId}:
    get:
      operationId: getSession
      tags: [sessions]
      summary: Get session details
      description: Returns session status, service URLs, and cost tracking
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Session details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteSession
      tags: [sessions]
      summary: Stop and destroy a session
      description: Destroys the Vast.ai instance and updates session status
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Session destroyed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/active:
    get:
      operationId: getActiveSession
      tags: [sessions]
      summary: Get current active session
      description: Returns the currently running session if any
      responses:
        "200":
          description: Active session or null
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActiveSessionResponse"

  /sessions/{sessionId}/refresh:
    post:
      operationId: refreshSessionStatus
      tags: [sessions]
      summary: Refresh session status from Vast.ai
      description: Polls Vast.ai for the latest instance status and updates the session
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /templates:
    get:
      operationId: listTemplates
      tags: [templates]
      summary: List Vast.ai templates
      description: Returns all registered templates including the default
      responses:
        "200":
          description: List of templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Template"
    post:
      operationId: createTemplate
      tags: [templates]
      summary: Create a new template on Vast.ai
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTemplateRequest"
      responses:
        "201":
          description: Template created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Template"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /templates/{templateId}:
    get:
      operationId: getTemplate
      tags: [templates]
      summary: Get template details
      parameters:
        - name: templateId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Template details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Template"
        "404":
          description: Template not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateTemplate
      tags: [templates]
      summary: Update a template
      parameters:
        - name: templateId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTemplateRequest"
      responses:
        "200":
          description: Template updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Template"
        "404":
          description: Template not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteTemplate
      tags: [templates]
      summary: Delete a template
      parameters:
        - name: templateId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Template deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Template not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /offers:
    get:
      operationId: searchOffers
      tags: [offers]
      summary: Search GPU offers on Vast.ai
      description: Search available GPU machines with profile-aware filters
      parameters:
        - name: profileId
          in: query
          required: false
          schema:
            type: integer
          description: Filter offers by GPU profile
        - name: gpuName
          in: query
          required: false
          schema:
            type: string
          description: Filter by GPU name (e.g., RTX 4090)
        - name: numGpus
          in: query
          required: false
          schema:
            type: integer
          description: Minimum number of GPUs
        - name: maxPrice
          in: query
          required: false
          schema:
            type: number
          description: Maximum price per hour
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
          description: Max number of results
      responses:
        "200":
          description: List of GPU offers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GpuOffer"

  /scheduler:
    get:
      operationId: getSchedulerConfig
      tags: [scheduler]
      summary: Get scheduler configuration
      description: Returns the current session scheduler configuration
      responses:
        "200":
          description: Scheduler configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SchedulerConfig"
    put:
      operationId: updateSchedulerConfig
      tags: [scheduler]
      summary: Update scheduler configuration
      description: Updates the session scheduler configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSchedulerRequest"
      responses:
        "200":
          description: Updated scheduler configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SchedulerConfig"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [sessions]
      summary: Dashboard summary
      description: Returns summary stats for the dashboard
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /skills:
    get:
      operationId: listSkills
      tags: [skills]
      summary: List all skills
      description: Returns imported skills and built-in skill metadata
      parameters:
        - name: class
          in: query
          schema:
            type: string
            enum: [doctrine, workflow, context, efficiency, team, repo]
        - name: trustTier
          in: query
          schema:
            type: string
            enum: [floatr_native, reviewed, user_approved, experimental]
        - name: reviewStatus
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 200
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Skills list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillsListResponse"

  /skills/import:
    post:
      operationId: importSkill
      tags: [skills]
      summary: Import skills from a GitHub repository
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportSkillRequest"
      responses:
        "201":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportSkillResponse"
        "400":
          description: Invalid URL or no skills found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /skills/compile-preview:
    post:
      operationId: compileSkillPreview
      tags: [skills]
      summary: Preview bundle compilation
      description: Compile a bundle against a context and return the result without persisting
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompilePreviewRequest"
      responses:
        "200":
          description: Compiled bundle preview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompilePreviewResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /skills/evals:
    get:
      operationId: listSkillEvals
      tags: [skills]
      summary: List skill evaluation results (not yet available)
      responses:
        "501":
          description: Not implemented
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotImplementedResponse"

  /skills/evals/run:
    post:
      operationId: runSkillEval
      tags: [skills]
      summary: Run a skill evaluation harness (not yet available)
      responses:
        "501":
          description: Not implemented
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotImplementedResponse"

  /skills/discover:
    post:
      operationId: discoverSkills
      tags: [skills]
      summary: Discover skills from external registries (not yet available)
      responses:
        "501":
          description: Not implemented
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotImplementedResponse"

  /skills/leaderboard:
    get:
      operationId: getSkillLeaderboard
      tags: [skills]
      summary: Skill leaderboard (not yet available)
      responses:
        "501":
          description: Not implemented
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotImplementedResponse"

  /skills/{skillId}:
    get:
      operationId: getSkill
      tags: [skills]
      summary: Get skill details and version history
      parameters:
        - name: skillId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Skill with versions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillDetailResponse"
        "404":
          description: Skill not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /skills/{skillId}/review:
    post:
      operationId: reviewSkill
      tags: [skills]
      summary: Approve or reject a skill
      parameters:
        - name: skillId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewSkillRequest"
      responses:
        "200":
          description: Updated skill
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillDetailResponse"
        "404":
          description: Skill not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /skills/{skillId}/enable:
    post:
      operationId: enableSkill
      tags: [skills]
      summary: Enable a skill
      parameters:
        - name: skillId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated skill
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillDetailResponse"
        "404":
          description: Skill not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /skills/{skillId}/disable:
    post:
      operationId: disableSkill
      tags: [skills]
      summary: Disable a skill
      parameters:
        - name: skillId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated skill
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillDetailResponse"
        "404":
          description: Skill not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /skill-bundles:
    get:
      operationId: listSkillBundles
      tags: [skills]
      summary: List all skill bundles
      responses:
        "200":
          description: Bundle list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BundleListResponse"
    post:
      operationId: createSkillBundle
      tags: [skills]
      summary: Create a new skill bundle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBundleRequest"
      responses:
        "201":
          description: Bundle created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BundleResponse"
        "409":
          description: Slug already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /skill-bundles/seed:
    post:
      operationId: seedDefaultBundles
      tags: [skills]
      summary: Seed default bundles
      description: Seeds the four default bundles if they do not exist
      responses:
        "200":
          description: Seed result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BundleListResponse"

  /skill-bundles/compile:
    post:
      operationId: compileBundle
      tags: [skills]
      summary: Compile a bundle from context
      description: Auto-selects the best bundle from context and compiles it. Pass bundleId to override.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompileBundleRequest"
      responses:
        "200":
          description: Compiled bundle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompiledBundleResult"
        "400":
          description: Invalid request or no bundle available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /skill-bundles/{bundleId}:
    get:
      operationId: getSkillBundle
      tags: [skills]
      summary: Get bundle details
      parameters:
        - name: bundleId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Bundle details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BundleResponse"
        "404":
          description: Bundle not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateSkillBundle
      tags: [skills]
      summary: Update a skill bundle
      parameters:
        - name: bundleId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBundleRequest"
      responses:
        "200":
          description: Updated bundle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BundleResponse"
        "404":
          description: Bundle not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /skill-bundles/{bundleId}/activate:
    post:
      operationId: activateSkillBundle
      tags: [skills]
      summary: Set a bundle as active for the next session launch
      parameters:
        - name: bundleId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActivateBundleRequest"
      responses:
        "200":
          description: Activation queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivateBundleResponse"
        "404":
          description: Bundle not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/{sessionId}/skills:
    get:
      operationId: getSessionSkills
      tags: [skills]
      summary: Get active skills for a session
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Session skill activations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionSkillsResponse"

  /sessions/{sessionId}/skills/feedback:
    post:
      operationId: submitSkillFeedback
      tags: [skills]
      summary: Submit feedback on a skill during a session
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SkillFeedbackRequest"
      responses:
        "201":
          description: Feedback recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillFeedbackResponse"
        "400":
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Skill not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success

    GpuProfile:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        displayName:
          type: string
        gpuName:
          type: string
        numGpus:
          type: integer
        totalVram:
          type: integer
        dockerImageTag:
          type: string
        defaultQuant:
          type: string
        quantSizeGb:
          type: integer
        diskSizeGb:
          type: integer
        estimatedSpeedMin:
          type: number
        estimatedSpeedMax:
          type: number
        estimatedCostMin:
          type: number
        estimatedCostMax:
          type: number
        llamaCtxSize:
          type: integer
        llamaBatchSize:
          type: integer
        llamaExtraArgs:
          type: string
        searchParams:
          type: object
        startupTimeMin:
          type: integer
          description: Estimated startup time in minutes (first launch)
        modelRepo:
          type: string
          description: HuggingFace model repository to download on the instance
        servedModelName:
          type: string
          description: Model name used for the vLLM --served-model-name flag and litellm alias
        modelDisplayName:
          type: string
          description: Human-readable model name shown in the dashboard
      required:
        - id
        - name
        - displayName
        - gpuName
        - numGpus
        - totalVram
        - dockerImageTag
        - defaultQuant
        - quantSizeGb
        - diskSizeGb
        - estimatedSpeedMin
        - estimatedSpeedMax
        - estimatedCostMin
        - estimatedCostMax
        - llamaCtxSize
        - llamaBatchSize
        - searchParams
        - startupTimeMin
        - modelRepo
        - servedModelName
        - modelDisplayName

    TeamMember:
      type: object
      properties:
        name:
          type: string
        password:
          type: string
          nullable: true
          description: Only present on GET /sessions/:id (detail). Omitted from list responses.
        path:
          type: string
        ideUrl:
          type: string
          nullable: true
      required:
        - name
        - path

    Session:
      type: object
      properties:
        id:
          type: integer
        profileId:
          type: integer
        profileName:
          type: string
        vastInstanceId:
          type: integer
          nullable: true
        vastOfferId:
          type: integer
          nullable: true
        templateHash:
          type: string
          nullable: true
        status:
          type: string
          enum: [pending, provisioning, downloading, starting, ready, stopping, stopped, error]
        statusMessage:
          type: string
          nullable: true
        boltDiyUrl:
          type: string
          nullable: true
        codeServerUrl:
          type: string
          nullable: true
        previewUrl:
          type: string
          nullable: true
        sshHost:
          type: string
          nullable: true
        sshPort:
          type: integer
          nullable: true
        publicIp:
          type: string
          nullable: true
        costPerHour:
          type: number
          nullable: true
        totalCost:
          type: number
          nullable: true
        gpuName:
          type: string
          nullable: true
        numGpus:
          type: integer
          nullable: true
        startedAt:
          type: string
          format: date-time
          nullable: true
        stoppedAt:
          type: string
          format: date-time
          nullable: true
        teamMembers:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/TeamMember"
        taskMode:
          type: string
          nullable: true
          description: "Task mode used for Smart Skills selection (build, review, debug, refactor, explore, team)"
        tokenMode:
          type: string
          nullable: true
          description: "Token mode used for context budgeting (full, core, lean, ultra)"
        activeBundleId:
          type: integer
          nullable: true
          description: Active Smart Skills bundle ID
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - profileId
        - profileName
        - status
        - createdAt
        - updatedAt

    ActiveSessionResponse:
      type: object
      properties:
        session:
          $ref: "#/components/schemas/Session"
          nullable: true
      required:
        - session

    CreateSessionRequest:
      type: object
      properties:
        profileId:
          type: integer
        offerId:
