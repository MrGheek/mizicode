        overlapScore:
          type: number
        blastRadiusOverlap:
          type: number
        conflictingResources:
          type: array
          items:
            type: string
        recommendation:
          type: string
          enum: [no_conflict, warn, block]
        symbols:
          type: array
          items:
            type: string
          nullable: true
          description: >
            Specific symbol name(s) that collide between the two lanes.
            Null when the conflict is at file level (no symbol metadata provided).
        detail:
          type: string
          nullable: true
      required: [laneIdA, laneIdB, memberA, memberB, overlapScore, blastRadiusOverlap, conflictingResources, recommendation]

