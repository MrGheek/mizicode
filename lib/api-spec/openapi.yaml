    # ── Coordination Schemas ──────────────────────────────────────────────────

    LanePolicyLimits:
      type: object
      properties:
        maxConcurrentClaims:
          type: integer
        heavyJobSlots:
          type: integer
        maxBlastRadiusFiles:
          type: integer
        claimTtlSeconds:
          type: integer
      required: [maxConcurrentClaims, heavyJobSlots, maxBlastRadiusFiles, claimTtlSeconds]

    LanePolicy:
      type: object
      properties:
        laneType:
          type: string
          enum: [ux, debug, backend, review, general]
        defaultTaskMode:
          type: string
        defaultTokenMode:
          type: string
        allowedClaimTypes:
          type: array
          items:
            type: string
        limits:
          $ref: "#/components/schemas/LanePolicyLimits"
        sharedMemoryScopes:
          type: array
          items:
            type: string
        privateMemoryScopes:
          type: array
          items:
            type: string
      required: [laneType, defaultTaskMode, defaultTokenMode, allowedClaimTypes, limits, sharedMemoryScopes, privateMemoryScopes]

    LaneResponse:
      type: object
      properties:
        id:
          type: integer
        sessionId:
          type: integer
        memberIdentifier:
          type: string
        laneType:
          type: string
        status:
          type: string
          enum: [active, blocked, review-needed, ready-to-merge]
        currentTask:
          type: string
          nullable: true
        tokenMode:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, sessionId, memberIdentifier, laneType, status, createdAt, updatedAt]

    LaneClaimItem:
      type: object
      properties:
        id:
          type: integer
        laneId:
          type: integer
        memberIdentifier:
          type: string
        claimType:
          type: string
          enum: [file, module, symbol, task]
        resourcePath:
          type: string
        symbolName:
          type: string
          nullable: true
        taskDescription:
          type: string
          nullable: true
        strength:
          type: number
          description: Claim strength 0.0–1.0
        expiresAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, laneId, memberIdentifier, claimType, resourcePath, strength, createdAt]

    LaneWithPolicy:
      allOf:
        - $ref: "#/components/schemas/LaneResponse"
        - type: object
          properties:
            policy:
              $ref: "#/components/schemas/LanePolicy"
            claims:
              type: array
              items:
                $ref: "#/components/schemas/LaneClaimItem"
          required: [policy, claims]

    LaneListResponse:
      type: object
      properties:
        sessionId:
          type: integer
        lanes:
          type: array
          items:
            $ref: "#/components/schemas/LaneWithPolicy"
        total:
          type: integer
      required: [sessionId, lanes, total]

    CreateLaneRequest:
      type: object
      properties:
        memberIdentifier:
          type: string
          description: Stable identifier for the team member (e.g. user slug or operator ID)
        laneType:
          type: string
          enum: [ux, debug, backend, review, general]
          default: general
        currentTask:
          type: string
          nullable: true
        tokenMode:
          type: string
          enum: [full, core, lean, ultra]
          nullable: true
      required: [memberIdentifier]

    UpdateLaneRequest:
      type: object
      properties:
        status:
          type: string
          enum: [active, blocked, review-needed, ready-to-merge]
        laneType:
          type: string
          enum: [ux, debug, backend, review, general]
        currentTask:
          type: string
          nullable: true
        tokenMode:
          type: string
          enum: [full, core, lean, ultra]
          nullable: true

    BlastEdge:
      type: object
      description: A dependency graph edge that triggered a blast-radius conflict warning.
      properties:
        fromPath:
          type: string
          description: File path of the caller.
        toPath:
          type: string
          description: File path of the callee.
        callerSymbol:
          type: string
          nullable: true
          description: Symbol in fromPath that calls into toPath, if known.
        calleeSymbol:
          type: string
          nullable: true
          description: Symbol in toPath that is called, if known.
      required: [fromPath, toPath]

    ClaimOverlapItem:
      type: object
      properties:
        conflictingLaneId:
          type: integer
        conflictingMember:
          type: string
        overlapScore:
          type: number
        blastRadiusOverlap:
          type: number
        recommendation:
          type: string
          enum: [no_conflict, warn, block]
        symbols:
          type: array
          items:
            type: string
          nullable: true
          description: >
            Specific symbol name(s) that collide between the two lanes.
            Null when the conflict is at file level (no symbol metadata provided).
        triggeringEdges:
          type: array
          items:
            $ref: "#/components/schemas/BlastEdge"
          description: >
            Dependency edges that triggered the blast-radius warning.
            Empty when the conflict is a direct file/symbol overlap rather than
            a call-graph dependency.
      required: [conflictingLaneId, conflictingMember, overlapScore, blastRadiusOverlap, recommendation, triggeringEdges]

    ClaimResponse:
      type: object
      properties:
        claim:
          $ref: "#/components/schemas/LaneClaimItem"
        overlaps:
          type: array
          items:
            $ref: "#/components/schemas/ClaimOverlapItem"
        overallRecommendation:
          type: string
          enum: [no_conflict, warn, block]
      required: [claim, overlaps, overallRecommendation]

    ClaimReleaseResponse:
      type: object
      properties:
        claimId:
          type: integer
        action:
          type: string
          enum: [released, heartbeat_refreshed]
        expiresAt:
          type: string
          format: date-time
          nullable: true
      required: [claimId, action]

    CreateClaimRequest:
      type: object
      properties:
        claimType:
          type: string
          enum: [file, module, symbol, task]
        resourcePath:
          type: string
        symbolName:
          type: string
          nullable: true
        claimSymbols:
          type: array
          items:
            type: string
          nullable: true
          description: >
            Optional list of specific function/class/variable names being
            edited within resourcePath. When both the caller and the other
            lane supply claimSymbols, conflict detection is refined to the
            symbol level — two lanes editing distinct symbols in the same
            file will NOT raise a conflict warning.
        taskDescription:
          type: string
          nullable: true
        strength:
          type: number
          minimum: 0
          maximum: 1
          default: 0.7
        ttlSeconds:
          type: integer
          default: 300
      required: [claimType, resourcePath]

    HandoffResponse:
      type: object
      properties:
        id:
          type: integer
        fromLaneId:
          type: integer
        toLaneIds:
          type: array
          items:
            type: integer
        handoffType:
          type: string
          enum: [blocked, needs_review, safe_to_merge, watch_files, related_lane]
        resourcePaths:
          type: array
          items:
            type: string
        message:
          type: string
          nullable: true
        status:
          type: string
          enum: [pending, acknowledged, dismissed, expired]
        acknowledgedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, fromLaneId, toLaneIds, handoffType, resourcePaths, status, createdAt]

    CreateHandoffRequest:
      type: object
      properties:
