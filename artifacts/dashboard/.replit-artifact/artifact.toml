kind = "web"
previewPath = "/"
title = "MIZI Code"
version = "1.0.0"
id = "artifacts/dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23183

[services.development]
run = "pnpm --filter @workspace/dashboard run dev"

[services.production]
publicDir = "artifacts/dashboard/dist/public"
serve = "static"

[services.production.build]
args = ["pnpm", "--filter", "@workspace/dashboard", "run", "build"]

[services.production.build.env]
PORT = "23183"
BASE_PATH = "/"
NODE_ENV = "production"
CI = "true"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23183"
BASE_PATH = "/"
