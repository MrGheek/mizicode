appId: com.mizi.local
productName: Mizi
copyright: "Copyright © 2025 Mizi"

directories:
  output: ../../dist-electron
  buildResources: build

files:
  - dist/**
  - package.json
  - "!dist/**/*.map"

extraResources:
  - from: ../api-server/dist
    to: api-server/dist
    filter:
      - "**/*"
      - "!**/*.map"
  - from: ../dashboard/dist
    to: dashboard/dist
    filter:
      - "**/*"
      - "!**/*.map"
  - from: ../dashboard/serve.mjs
    to: dashboard/serve.mjs

mac:
  category: public.app-category.developer-tools
  # identity is intentionally omitted so electron-builder auto-selects the
  # Developer ID Application certificate imported into the CI keychain.
  # Local dev builds will be unsigned (no cert in keychain) — that is fine.
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # electron-builder's built-in notarize support (electron-builder >= 24.9).
  # Reads APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, and APPLE_TEAM_ID from env.
  notarize: true
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: dir
      arch:
        - arm64
        - x64

dmg:
  title: "${productName} ${version}"
  window:
    width: 540
    height: 380

asar: true
compression: maximum

# GitHub publisher — provides metadata for electron-builder's release tooling.
# Actual asset upload is handled by softprops/action-gh-release in the workflow;
# electron-builder itself only publishes when --publish flag is passed explicitly.
publish:
  provider: github
  releaseType: release
