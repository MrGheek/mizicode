# ============================================================
# Fly.io configuration — MIZI API Server
#
# Deploy with:
#   fly launch --config artifacts/api-server/fly.toml
#   fly secrets set --app mizi-api \
#       DATABASE_URL="postgres://..." \
#       MIZI_ENCRYPTION_KEY="$(openssl rand -hex 32)" \
#       MIZI_MEM_TOKEN="$(openssl rand -hex 32)" \
#       VASTAI_API_KEY="..." \
#       GITHUB_OAUTH_CLIENT_ID="..." \
#       GITHUB_OAUTH_CLIENT_SECRET="..." \
#       DASHBOARD_URL="https://mizicode.fly.dev" \
#       NVIDIA_NIM_API_KEY="nvapi-..."
#   fly deploy . \
#       --config artifacts/api-server/fly.toml \
#       --dockerfile artifacts/api-server/Dockerfile
#
# Secrets (set via `fly secrets set --app mizi-api`):
#
#   Core (required — server will not start without these in production):
#     DATABASE_URL                     — PostgreSQL connection string (auto-set by fly postgres attach)
#     MIZI_ENCRYPTION_KEY              — 64-hex-char key for encrypting stored connection strings
#                                        Generate: openssl rand -hex 32
#     MIZI_MEM_TOKEN                   — Token used to derive the GitHub OAuth token encryption key.
#                                        Generate: openssl rand -hex 32
#                                        Missing = server crashes mid-OAuth-callback with "error" redirect
#
#   GitHub OAuth (required for Connect GitHub to work):
#     GITHUB_OAUTH_CLIENT_ID           — OAuth App client ID (from github.com/settings/developers)
#     GITHUB_OAUTH_CLIENT_SECRET       — OAuth App client secret
#     DASHBOARD_URL                    — Full URL of the dashboard, e.g. https://mizicode.fly.dev
#                                        Required when the dashboard and API are on different origins.
#                                        Without it, post-OAuth redirects go to the API root instead
#                                        of the dashboard — the token is stored but the dashboard
#                                        never receives the ?github_oauth=connected signal.
#
#   Fly workspace provisioning (required for NIM sessions):
#     FLY_API_TOKEN                    — Fly.io personal access token used by the API server
#                                        to create/destroy workspace machines via Machines API
#                                        Generate: fly tokens create deploy -x 999999h
#     FLY_WORKSPACE_APP_NAME           — Name of the dedicated workspace Fly app (e.g. mizi-workspace)
#                                        Workspace machines are created inside this app, separate
#                                        from mizi-api. One-time setup: flyctl apps create mizi-workspace
#                                        Falls back to FLY_APP_NAME if not set (deprecated).
#
#   AI providers (at least one required for AI features):
#     NVIDIA_NIM_API_KEY               — NVIDIA NIM API key (recommended, free tier available)
#     VASTAI_API_KEY                   — Vast.ai REST API key
#   Optional additional model providers:
#     AI_INTEGRATIONS_OPENAI_API_KEY   — OpenAI-compatible API key
#     AI_INTEGRATIONS_OPENAI_BASE_URL  — OpenAI-compatible base URL
#     VULTR_INFERENCE_API_KEY          — Vultr Inference model provider
#     TOGETHER_API_KEY                 — Together.xyz model provider
#     DEEPINFRA_API_KEY                — DeepInfra model provider
# ============================================================

app = "mizi-api"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"

[deploy]
  release_command = "node dist/migrate.mjs"

[env]
  PORT             = "8080"
  MEM_DATA_DIR     = "/data/memory"
  CLAIM_RETENTION_DAYS = "7"
  NODE_ENV         = "production"

[[mounts]]
  source      = "mizi_memory"
  destination = "/data/memory"

[[services]]
  protocol    = "tcp"
  internal_port = 8080
  auto_stop_machines  = false
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port     = 443
    handlers = ["tls", "http"]

  [[services.ports]]
    port     = 80
    handlers = ["http"]
    force_https = true

  [services.http_checks]
    interval       = "15s"
    timeout        = "5s"
    grace_period   = "30s"
    method         = "GET"
    path           = "/api/healthz"

[[vm]]
  size   = "shared-cpu-1x"
  memory = "512mb"
